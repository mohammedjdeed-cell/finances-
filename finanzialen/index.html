    const LanguageContext = createContext();

    function LanguageProvider({ children }) {
      const [lang, setLang] = useState(() => safeGetStorage('budget_app_lang', 'de'));
      const changeLanguage = (newLang) => { setLang(newLang); safeSetStorage('budget_app_lang', newLang); };

      const t = (path) => {
        const keys = path.split('.');
        let translation = translations[lang];
        for (const key of keys) {
          if (translation && translation[key] !== undefined) translation = translation[key];
          else {
            let fallback = translations['en'];
            for (const fallbackKey of keys) {
              if (fallback && fallback[fallbackKey] !== undefined) fallback = fallback[fallbackKey];
              else { fallback = null; break; }
            }
            return fallback || path;
          }
        }
        return translation;
      };
      return <LanguageContext.Provider value={{ t, i18n: { language: lang, changeLanguage } }}>{children}</LanguageContext.Provider>;
    }
    const useTranslation = () => useContext(LanguageContext);

    const generateInitialState = () => {
      const state = { categories: { incomes: [...INITIAL_CATEGORIES.incomes], expenses: [...INITIAL_CATEGORIES.expenses] }, values: {}, initialSavingsBase: 5000, categoryOverrides: {} };
      ["2026", "2027", "2028"].forEach(year => {
        state.values[year] = { incomes: {}, expenses: {} };
        state.categories.incomes.forEach(item => { state.values[year].incomes[item] = {}; getMonthsForYear(parseInt(year)).forEach(m => state.values[year].incomes[item][m] = 0); });
        state.categories.expenses.forEach(item => { state.values[year].expenses[item] = {}; getMonthsForYear(parseInt(year)).forEach(m => state.values[year].expenses[item][m] = 0); });
      });
      return state;
    };

    const mergeAndLockState = (loadedState) => {
      if (!loadedState) return generateInitialState();
      const merged = { categories: { incomes: [...(loadedState.categories?.incomes || INITIAL_CATEGORIES.incomes)], expenses: [...(loadedState.categories?.expenses || INITIAL_CATEGORIES.expenses)] }, values: { ...(loadedState.values || {}) }, initialSavingsBase: loadedState.initialSavingsBase !== undefined ? loadedState.initialSavingsBase : 5000, categoryOverrides: loadedState.categoryOverrides || {} };
      INITIAL_CATEGORIES.incomes.forEach(item => { if (!merged.categories.incomes.includes(item)) merged.categories.incomes.push(item); });
      INITIAL_CATEGORIES.expenses.forEach(item => { if (!merged.categories.expenses.includes(item)) merged.categories.expenses.push(item); });

        if (!merged.values[year]) merged.values[year] = { incomes: {}, expenses: {} };
        if (!merged.values[year].incomes) merged.values[year].incomes = {};
        if (!merged.values[year].expenses) merged.values[year].expenses = {};
        merged.categories.incomes.forEach(item => { if (!merged.values[year].incomes[item]) merged.values[year].incomes[item] = {}; getMonthsForYear(parseInt(year)).forEach(m => { if (merged.values[year].incomes[item][m] === undefined) merged.values[year].incomes[item][m] = 0; }); });
        merged.categories.expenses.forEach(item => { if (!merged.values[year].expenses[item]) merged.values[year].expenses[item] = {}; getMonthsForYear(parseInt(year)).forEach(m => { if (merged.values[year].expenses[item][m] === undefined) merged.values[year].expenses[item][m] = 0; }); });
      });
      return merged;
    };

    const IDB = {
      dbName: 'BudgetDatabase_v2', dbVersion: 1,
      open() {
        return new Promise((resolve, reject) => {
          const request = indexedDB.open(this.dbName, this.dbVersion);
          request.onupgradeneeded = (e) => {
            const database = e.target.result;
            if (!database.objectStoreNames.contains('state')) database.createObjectStore('state', { keyPath: 'id' });
            if (!database.objectStoreNames.contains('queue')) database.createObjectStore('queue', { keyPath: 'id' });
          };
          request.onsuccess = (e) => resolve(e.target.result);
          request.onerror = (e) => reject(e.target.error);
        });
      },
      async get(storeName, key) {
        const database = await this.open();
        return new Promise((resolve, reject) => {
          const tx = database.transaction(storeName, 'readonly');
          const request = tx.objectStore(storeName).get(key);
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
      },
      async set(storeName, value) {
        const database = await this.open();
        return new Promise((resolve, reject) => {
          const tx = database.transaction(storeName, 'readwrite');
          const request = tx.objectStore(storeName).put(value);
          request.onsuccess = () => resolve();
          request.onerror = () => reject(request.error);
        });
      },
      async delete(storeName, key) {
        const database = await this.open();
        return new Promise((resolve, reject) => {
          const tx = database.transaction(storeName, 'readwrite');
          const request = tx.objectStore(storeName).delete(key);
          request.onsuccess = () => resolve();
          request.onerror = () => reject(request.error);
        });
      }

    function MainAppContent() {

      }, [lastScrollY]);

      const getEffectiveExpenseBracket = (posten) => {
        if (data.categoryOverrides && data.categoryOverrides[posten]) return data.categoryOverrides[posten];
        return getExpenseBracket(posten);
      };

      useEffect(() => {
        safeSetStorage('budget_app_theme', theme);
        const applyTheme = (val) => {
          const rootEl = document.documentElement;
          let resolvedTheme = val === 'system' ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light') : val;
          rootEl.setAttribute('data-theme', resolvedTheme);
          if (resolvedTheme === 'dark') rootEl.classList.add('dark');
          else rootEl.classList.remove('dark');
        };
        applyTheme(theme);
        if (theme === 'system') {
          const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');

            const rootEl = document.documentElement;

            rootEl.setAttribute('data-theme', resolved);
            if (resolved === 'dark') rootEl.classList.add('dark');
            else rootEl.classList.remove('dark');
          };
          mediaQuery.addEventListener('change', handleChange);
          return () => mediaQuery.removeEventListener('change', handleChange);
        }
      }, [theme]);

      useEffect(() => {
        if (selectedMonth === "AnnualOverview") return; 
        const validMonths = getMonthsForYear(selectedYear);
        if (!validMonths.includes(selectedMonth)) setSelectedMonth(validMonths[0]);
      }, [selectedYear]);

      useEffect(() => {
        async function loadInitialData() {
          try {
            const cached = await IDB.get('state', 'budget_data');
            if (cached) setData(mergeAndLockState(cached.payload));
          } catch (e) { console.warn("Failed to load DB state", e); }
        }
        loadInitialData();

        let unsubscribe = () => {};
        if (db) {
          unsubscribe = db.collection('monthly_logs').doc('house_finanzen_state')
            .onSnapshot(async (doc) => {
              if (doc.exists) {
                const remote = doc.data();
                const localCached = await IDB.get('state', 'budget_data');
                if (!localCached || remote.updatedAt > localCached.updatedAt) {
                  const merged = mergeAndLockState(remote.payload);
                  setData(merged);
                  await IDB.set('state', { id: 'budget_data', payload: merged, updatedAt: remote.updatedAt });
                  setSyncStatus("synced");
                }
              }
            }, (err) => { console.warn("Firestore offline", err); });
        }
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        const handleOnline = async () => { setIsOnline(true); await triggerLocalToCloudSync(); };

      }, [data]);

      const chronologicalTimelineResult = useMemo(() => {
        const resultSequence = {};
        let runningGuthaben = 0; 
        const targetSequence = [];
        [2026, 2027, 2028].forEach(yr => { getMonthsForYear(yr).forEach(mo => { targetSequence.push({ year: yr, month: mo }); }); });

        targetSequence.forEach(({ year, month }) => {
          const yearData = data.values[year];
          let monthlyIn = 0;
          let monthlyEx = 0;
          if (yearData) {
            if (yearData.incomes) data.categories.incomes.forEach(category => { monthlyIn += parseFloat(yearData.incomes[category]?.[month]) || 0; });
            if (yearData.expenses) data.categories.expenses.forEach(category => { monthlyEx += parseFloat(yearData.expenses[category]?.[month]) || 0; });
          }
          const availableFunds = runningGuthaben + monthlyIn;
          const endLeftover = availableFunds - monthlyEx;
          resultSequence[`${year}-${month}`] = { availableFunds, leftover: endLeftover, monthlyIncome: monthlyIn, monthlyExpenses: monthlyEx, prevGuthaben: runningGuthaben };
          runningGuthaben = endLeftover;
        });
        return resultSequence;
      }, [data]);

      useEffect(() => {
        if (selectedMonth === "AnnualOverview" || !chartRef.current) return;
        const ctx = chartRef.current.getContext('2d');
        const monthsForYear = getMonthsForYear(selectedYear);
        const incomeData = monthsForYear.map(m => getMonthlyTotal('incomes', m));
        const translatedLabels = monthsForYear.map(m => t(`months.${m}`));

        if (chartInstanceRef.current) chartInstanceRef.current.destroy();

        const isDarkTheme = document.documentElement.classList.contains('dark');
        const axisColor = isDarkTheme ? '#8b949e' : '#6b7280';
        const gridColor = isDarkTheme ? 'rgba(201, 209, 217, 0.08)' : 'rgba(31, 41, 55, 0.08)';

        chartInstanceRef.current = new Chart(ctx, {
          type: 'bar',
          data: {
            labels: translatedLabels,
            datasets: [
              { label: t('incomesHeader'), data: incomeData, backgroundColor: '#10b981', stack: 'Stack0', borderRadius: 4 },
              { label: t('bracketHousing'), data: monthsForYear.map(m => getBracketMonthlyTotal('housing', m)), backgroundColor: '#475569', stack: 'Stack1', borderRadius: 4 },
              { label: t('bracketLiving'), data: monthsForYear.map(m => getBracketMonthlyTotal('living', m)), backgroundColor: '#f59e0b', stack: 'Stack1', borderRadius: 4 },
              { label: t('bracketSubscriptions'), data: monthsForYear.map(m => getBracketMonthlyTotal('subscriptions', m)), backgroundColor: '#7c3aed', stack: 'Stack1', borderRadius: 4 },
              { label: t('bracketLeisure'), data: monthsForYear.map(m => getBracketMonthlyTotal('leisure', m)), backgroundColor: '#ec4899', stack: 'Stack1', borderRadius: 4 },
              { label: t('bracketProfessional'), data: monthsForYear.map(m => getBracketMonthlyTotal('professional', m)), backgroundColor: '#14b8a6', stack: 'Stack1', borderRadius: 4 }
            ]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            scales: {
              x: { ticks: { color: axisColor }, grid: { color: gridColor } },
              y: { beginAtZero: true, ticks: { color: axisColor, callback: function(value) { return value.toLocaleString(i18n.language === 'de' ? 'de-DE' : 'en-US', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 }); } }, grid: { color: gridColor } }
            },
            plugins: { legend: { labels: { color: axisColor } }, tooltip: { callbacks: { label: function(context) { let label = context.dataset.label || ''; if (label) label += ': '; if (context.parsed.y !== null) { label += new Intl.NumberFormat(i18n.language === 'de' ? 'de-DE' : 'en-US', { style: 'currency', currency: 'EUR' }).format(context.parsed.y); } return label; } } } }
          }
        });
        return () => { if (chartInstanceRef.current) chartInstanceRef.current.destroy(); };
      }, [data, selectedYear, selectedMonth, i18n.language, theme]);

      const annualOverviewData = useMemo(() => {
        const yearValues = data.values[selectedYear];
        const monthsForYear = getMonthsForYear(selectedYear);
        const totalsByCategory = {};
        let totalYearlyIn = 0; let totalYearlyEx = 0;
        const monthTotals = {};

        data.categories.expenses.forEach(category => { totalsByCategory[category] = 0; });
        monthsForYear.forEach(m => {
          let mIn = 0; let mEx = 0;
          data.categories.incomes.forEach(category => { const val = parseFloat(yearValues?.incomes?.[category]?.[m]) || 0; totalYearlyIn += val; mIn += val; });
          data.categories.expenses.forEach(category => { const val = parseFloat(yearValues?.expenses?.[category]?.[m]) || 0; totalYearlyEx += val; totalsByCategory[category] += val; mEx += val; });
          monthTotals[m] = { income: mIn, expenses: mEx };
        });

        const sortedExpenses = Object.keys(totalsByCategory).map(cat => ({ category: cat, total: totalsByCategory[cat] })).sort((a, b) => b.total - a.total);
        const peakCategory = sortedExpenses[0]?.total > 0 ? sortedExpenses[0].category : null;
        let highestMonth = null; let maxMonthEx = 0;
        monthsForYear.forEach(m => { if (monthTotals[m].expenses > maxMonthEx) { maxMonthEx = monthTotals[m].expenses; highestMonth = m; } });
        const savingsRate = totalYearlyIn > 0 ? ((totalYearlyIn - totalYearlyEx) / totalYearlyIn) * 100 : 0;
        return { totalYearlyIn, totalYearlyEx, sortedExpenses, peakCategory, highestMonth, savingsRate, monthTotals };
      }, [data, selectedYear]);

      useEffect(() => {
        if (selectedMonth !== "AnnualOverview" || !annualChartRef.current) return;
        const ctx = annualChartRef.current.getContext('2d');
        const activeExpenditures = annualOverviewData.sortedExpenses.filter(e => e.total > 0);
        const datasetLabels = activeExpenditures.map(e => t(`categories.${e.category}`).replace('categories.', ''));
        const datasetValues = activeExpenditures.map(e => e.total);

        const backgroundColors = activeExpenditures.map(e => {
          const bracket = getEffectiveExpenseBracket(e.category);
          if (bracket === 'housing') return '#475569';
          if (bracket === 'living') return '#f59e0b';
          if (bracket === 'subscriptions') return '#7c3aed';
          if (bracket === 'professional') return '#14b8a6';
          return '#ec4899';

        if (annualChartInstanceRef.current) annualChartInstanceRef.current.destroy();
        const isDarkTheme = document.documentElement.classList.contains('dark');
        const textColor = isDarkTheme ? '#8b949e' : '#6b7280';

        annualChartInstanceRef.current = new Chart(ctx, {
          type: 'doughnut',
          data: { labels: datasetLabels, datasets: [{ data: datasetValues, backgroundColor: backgroundColors, borderWidth: 1, borderColor: isDarkTheme ? '#0d1117' : '#ffffff' }] },
          options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { boxWidth: 12, font: { size: 10 }, color: textColor } } } }
        });
        return () => { if (annualChartInstanceRef.current) annualChartInstanceRef.current.destroy(); };
      }, [data, selectedYear, selectedMonth, i18n.language, annualOverviewData, theme]);

      const triggerLocalToCloudSync = async () => {
        setSyncStatus("syncing");
        try {
          if (!db) throw new Error("Database not initialized");
          const queueItem = await IDB.get('queue', 'pending_sync');
          if (queueItem) {
            const docRef = db.collection('monthly_logs').doc('house_finanzen_state');
            const doc = await docRef.get();
            if (!doc.exists || queueItem.updatedAt > doc.data().updatedAt) await docRef.set({ payload: queueItem.payload, updatedAt: queueItem.updatedAt });
            await IDB.delete('queue', 'pending_sync');
          }
          setSyncStatus("synced");
        } catch (e) { setSyncStatus("pending_sync"); }
      };

      const saveStateAndDispatch = async (updatedData, timestamp) => {
        setData(updatedData);
        await IDB.set('state', { id: 'budget_data', payload: updatedData, updatedAt: timestamp });
        await IDB.set('queue', { id: 'pending_sync', payload: updatedData, updatedAt: timestamp });
        if (navigator.onLine && db) {
          setSyncStatus("syncing");
          try { await db.collection('monthly_logs').doc('house_finanzen_state').set({ payload: updatedData, updatedAt: timestamp }); await IDB.delete('queue', 'pending_sync'); setSyncStatus("synced"); }
          catch (e) { setSyncStatus("pending_sync"); }
        } else {
          setSyncStatus("pending_sync");
          if ('serviceWorker' in navigator && 'SyncManager' in window) {
            const reg = await navigator.serviceWorker.ready;
            try { await reg.sync.register('sync-budget'); } catch (err) { }
          }
        }
      };

      const handleValueChange = async (type, posten, month, val) => {
        const parsedValue = val === '' ? 0 : parseFloat(val);
        const updatedVal = isNaN(parsedValue) ? 0 : parsedValue;
        const updatedData = { ...data };
        if (!updatedData.values[selectedYear]) updatedData.values[selectedYear] = { incomes: {}, expenses: {} };
        if (!updatedData.values[selectedYear][type][posten]) updatedData.values[selectedYear][type][posten] = {};
        updatedData.values[selectedYear][type][posten][month] = updatedVal;
        await saveStateAndDispatch(updatedData, Date.now());
      };

      const handleAddCategory = async (type, name, inputSetter) => {
        if (!name.trim()) return;
        const trimmedName = name.trim();
        if (data.categories[type].includes(trimmedName)) { alert(t('duplicateCategoryAlert')); return; }
        const updatedCategories = { ...data.categories, [type]: [...data.categories[type], trimmedName] };
        const updatedValues = { ...data.values };
        Object.keys(updatedValues).forEach(y => {
          if (!updatedValues[y][type][trimmedName]) updatedValues[y][type][trimmedName] = {};
          getMonthsForYear(parseInt(y)).forEach(m => { if (updatedValues[y][type][trimmedName][m] === undefined) updatedValues[y][type][trimmedName][m] = 0; });
        });
        inputSetter("");
        await saveStateAndDispatch({ categories: updatedCategories, values: updatedValues }, Date.now());
      };

      const handleApplyRecurring = async (type, item, startMonth, startYear, monthsCount, value) => {
        const updatedData = { ...data };
        const timeline = [];
        [2026, 2027, 2028].forEach(yr => { getMonthsForYear(yr).forEach(mo => { timeline.push({ year: yr, month: mo }); }); });
        const startIndex = timeline.findIndex(t => t.year === parseInt(startYear) && t.month === startMonth);
        if (startIndex !== -1) {
          for (let i = 0; i < monthsCount; i++) {
            const targetIndex = startIndex + i;
            if (targetIndex < timeline.length) {
              const { year, month } = timeline[targetIndex];
              if (!updatedData.values[year]) updatedData.values[year] = { incomes: {}, expenses: {} };
              if (!updatedData.values[year][type][item]) updatedData.values[year][type][item] = {};
              updatedData.values[year][type][item][month] = value;
            }
          }
        }
        await saveStateAndDispatch(updatedData, Date.now());
      };

      const handleMoveCategory = async (type, index, direction) => {
        const updatedData = { ...data };
        const categories = [...updatedData.categories[type]];
        if (direction === 'up' && index > 0) { const temp = categories[index]; categories[index] = categories[index - 1]; categories[index - 1] = temp; }
        else if (direction === 'down' && index < categories.length - 1) { const temp = categories[index]; categories[index] = categories[index + 1]; categories[index + 1] = temp; }
        else return;
        updatedData.categories[type] = categories;
        await saveStateAndDispatch(updatedData, Date.now());
      };

      const handleStartRename = (type, name) => { setEditingCategory({ type, name }); setEditCategoryValue(name); };
      const handleSaveRename = async () => {
        if (!editingCategory) return;
        const { type, name: originalName } = editingCategory;
        const newName = editCategoryValue.trim();
        if (!newName || newName === originalName) { setEditingCategory(null); return; }
        if (data.categories[type].includes(newName)) { alert(t('duplicateCategoryAlert')); return; }
        const updatedData = { ...data };
        updatedData.categories[type] = updatedData.categories[type].map(cat => cat === originalName ? newName : cat);
        Object.keys(updatedData.values).forEach(year => {
          const yearValues = updatedData.values[year]?.[type];
          if (yearValues && yearValues[originalName]) { yearValues[newName] = { ...yearValues[originalName] }; delete yearValues[originalName]; }
        });
        setEditingCategory(null);
        await saveStateAndDispatch(updatedData, Date.now());
      };

      const handleDeleteCategory = async (type, item) => {
        const key = t(`categories.${item}`);
        let cleanName = key.replace('categories.', ''); cleanName = cleanName.charAt(0).toUpperCase() + cleanName.slice(1);
        if (!window.confirm(t('deleteConfirmation').replace('{{name}}', cleanName))) return;
        const updatedData = { ...data };
        const fallbackKey = "Sonstiges";
        let hasData = false;
        Object.keys(updatedData.values).forEach(year => { const yearVals = updatedData.values[year]?.[type]?.[item]; if (yearVals) { Object.keys(yearVals).forEach(month => { if (yearVals[month] !== 0) hasData = true; }); } });
        if (hasData) {
          Object.keys(updatedData.values).forEach(year => {
            if (!updatedData.values[year][type][fallbackKey]) { updatedData.values[year][type][fallbackKey] = {}; getMonthsForYear(parseInt(year)).forEach(m => { updatedData.values[year][type][fallbackKey][m] = 0; }); }
            const deletedVals = updatedData.values[year]?.[type]?.[item] || {};
            getMonthsForYear(parseInt(year)).forEach(m => { updatedData.values[year][type][fallbackKey][m] = (updatedData.values[year][type][fallbackKey][m] || 0) + (deletedVals[m] || 0); });
          });
        }
        updatedData.categories[type] = updatedData.categories[type].filter(cat => cat !== item);
        Object.keys(updatedData.values).forEach(year => { if (updatedData.values[year]?.[type]) delete updatedData.values[year][type][item]; });
        await saveStateAndDispatch(updatedData, Date.now());
      };

      const handleResetData = async () => { if (window.confirm(t('confirmClear'))) await saveStateAndDispatch(generateInitialState(), Date.now()); };
      const handleExportBackup = () => { const downloadAnchor = document.createElement('a'); downloadAnchor.setAttribute("href", "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data, null, 2))); downloadAnchor.setAttribute("download", `finanzen_backup_${selectedYear}.json`); document.body.appendChild(downloadAnchor); downloadAnchor.click(); downloadAnchor.remove(); };
      const handleImportBackup = (event) => { const fileReader = new FileReader(); fileReader.onload = async (e) => { try { const importedState = JSON.parse(e.target.result); if (importedState && importedState.categories && importedState.values) { await saveStateAndDispatch(mergeAndLockState(importedState), Date.now()); alert(t('importSuccess')); } else alert(t('importError')); } catch (err) { alert(t('importError')); } }; if (event.target.files[0]) fileReader.readAsText(event.target.files[0]); };
      const triggerFileSelector = () => { if (fileInputRef.current) fileInputRef.current.click(); };
      const formatCurrency = (val) => new Intl.NumberFormat(i18n.language === 'de' ? 'de-DE' : 'en-US', { style: 'currency', currency: 'EUR' }).format(val || 0);
      
      const getMonthlyTotal = (type, targetMonth) => {
        if (!data.values[selectedYear]) return 0;
        return data.categories[type].reduce((sum, posten) => sum + (data.values[selectedYear][type][posten]?.[targetMonth] || 0), 0);
      };
      
      const getBracketMonthlyTotal = (bracketKey, month) => {
        if (!data.values[selectedYear]) return 0;
        return data.categories.expenses.filter(posten => getEffectiveExpenseBracket(posten) === bracketKey).reduce((sum, posten) => sum + (data.values[selectedYear].expenses[posten]?.[month] || 0), 0);
      };

      const getClusteredCategories = (categories, type) => {
        if (type === 'incomes') return categories; 
        const bracketOrder = ['housing', 'living', 'subscriptions', 'leisure', 'professional'];
        return [...categories].sort((a, b) => bracketOrder.indexOf(getEffectiveExpenseBracket(a)) - bracketOrder.indexOf(getEffectiveExpenseBracket(b)));
      };

      const totalIncome = useMemo(() => getMonthlyTotal('incomes', selectedMonth), [data, selectedMonth, selectedYear]);
      const totalExpenses = useMemo(() => getMonthlyTotal('expenses', selectedMonth), [data, selectedMonth, selectedYear]);
      const saldo = useMemo(() => totalIncome - totalExpenses, [totalIncome, totalExpenses]);
      const percentageSpent = useMemo(() => totalIncome === 0 ? 0 : (totalExpenses / totalIncome) * 100, [totalIncome, totalExpenses]);
      const activeLiquidityResult = useMemo(() => chronologicalTimelineResult[`${selectedYear}-${selectedMonth}`] || { leftover: 0 }, [chronologicalTimelineResult, selectedYear, selectedMonth]);

      const yearlyNetBalance = useMemo(() => {
        let totalIncomesYear = 0; let totalExpensesYear = 0; const yearData = data.values[selectedYear];
        if (!yearData) return 0; const monthsForYear = getMonthsForYear(selectedYear);
        if (yearData.incomes) data.categories.incomes.forEach(category => { if (yearData.incomes[category]) monthsForYear.forEach(m => totalIncomesYear += parseFloat(yearData.incomes[category][m]) || 0); });
        if (yearData.expenses) data.categories.expenses.forEach(category => { if (yearData.expenses[category]) monthsForYear.forEach(m => totalExpensesYear += parseFloat(yearData.expenses[category][m]) || 0); });
        return totalIncomesYear - totalExpensesYear;
      }, [data, selectedYear]);

      const auditBreakdown = useMemo(() => {
        let accIncome = 0; let accExpense = 0;
        Object.keys(data.values).forEach(year => {
          const yearData = data.values[year]; if (!yearData) return; const monthsForYear = getMonthsForYear(parseInt(year));
          if (yearData.incomes) data.categories.incomes.forEach(category => { if (yearData.incomes[category]) monthsForYear.forEach(m => accIncome += parseFloat(yearData.incomes[category][m]) || 0); });
          if (yearData.expenses) data.categories.expenses.forEach(category => { if (yearData.expenses[category]) monthsForYear.forEach(m => accExpense += parseFloat(yearData.expenses[category][m]) || 0); });
        });
        return { accIncome, accExpense };
      }, [data]);

      const getItemStats = (type, posten) => {
        const monthsForYear = getMonthsForYear(selectedYear);
        const ytdTotal = monthsForYear.reduce((sum, m) => sum + (data.values[selectedYear]?.[type]?.[posten]?.[m] || 0), 0);
        return { ytdTotal, average: ytdTotal / monthsForYear.length };

      return (
        <div className="flex flex-col min-h-screen">
          
          <header className={`bg-indigo-700 text-white shadow-md fixed w-full h-[56px] top-0 z-50 transition-transform duration-300 ${isHeaderVisible ? 'translate-y-0' : '-translate-y-full'}`}>

              <div className="flex items-center space-x-2">
                <i className="fa-solid fa-wallet text-2xl"></i>
                <h1 className="text-xl font-bold tracking-tight">{t('title')} <span className="text-xs bg-indigo-500 px-2 py-1 rounded ml-1">{t('cloudSync')}</span></h1>
              </div>

              <div className="flex items-center space-x-3">
                {syncStatus === "syncing" && (
                  <span className="bg-blue-600 text-white px-2.5 py-1 text-xs rounded-full flex items-center gap-1 hidden md:inline-flex">
                    <i className="fa-solid fa-arrows-rotate animate-spin"></i> {t('syncing')}
                  </span>

                {syncStatus === "synced" && (

                <span className={`px-2.5 py-1 text-xs rounded-full flex items-center gap-1 ${isOnline ? 'bg-indigo-500 text-white' : 'bg-rose-600 text-white'}`}>

            <div className="p-5 flex flex-col h-full justify-between">
              <div className="space-y-6">
                <div className="flex justify-between items-center pb-4 border-b border-theme">

                              <div className="text-right w-full flex items-center justify-end gap-1.5">
                                {activeTab === "view" ? (
                                  <span className="font-bold text-theme-main block whitespace-nowrap">{formatCurrency(val || 0)}</span>
                                ) : (
                                  <React.Fragment>
                                    <input type="number" step="any" value={val !== undefined && val !== 0 ? val : ''} placeholder="0" onChange={(e) => handleValueChange('expenses', item, selectedMonth, e.target.value)} className="num-input-fix bg-theme-input text-theme-input border border-theme text-right rounded-lg outline-none focus:border-indigo-500 font-semibold transition py-1 px-2" />
                                    <button onClick={() => setRecurringSetup({ type: 'expenses', item, value: val || 0 })} className="text-theme-muted hover:text-indigo-500 p-1 transition outline-none shrink-0" title={t('setRecurringBudget')}><i className="fa-solid fa-arrows-spin"></i></button>
                                  </React.Fragment>
                                )}
                              </div>
                              <div className="text-right text-theme-muted font-medium whitespace-nowrap w-full">{formatCurrency(ytdTotal)}</div>
                              <div className="text-right text-theme-muted text-xs whitespace-nowrap w-full">{formatCurrency(average)}</div>
                            </div>
                          );
                        })}
                      </div>
                    </div>

                    {activeTab === "edit" && (
                      <div className="p-3 bg-theme-footer border-t border-theme flex gap-2">
                        <input type="text" value={customExpenseInput} onChange={(e) => setCustomExpenseInput(e.target.value)} placeholder={t('addPlaceholder')} className="flex-grow bg-theme-input border border-theme text-theme-input rounded px-3 py-1.5 text-sm outline-none focus:border-indigo-500 transition" />
                        <button onClick={() => handleAddCategory('expenses', customExpenseInput, setCustomExpenseInput)} className="bg-indigo-600 hover:bg-indigo-500 text-white text-xs px-4 py-2 rounded-lg font-bold transition flex items-center gap-1 shrink-0"><i className="fa-solid fa-plus"></i> Add</button>
                      </div>
                    )}
                  </section>

                </div>
              </div>
            )}
          </main>

          {recurringSetup && (
            <div className="fixed inset-0 bg-slate-950/60 z-[60] backdrop-blur-sm flex items-center justify-center p-4">
              <div className="bg-theme-card rounded-2xl border border-theme p-6 max-w-sm w-full shadow-2xl space-y-4">
                <div className="flex justify-between items-center pb-2 border-b border-theme">
                  <h3 className="font-bold text-theme-main text-sm flex items-center gap-1.5"><i className="fa-solid fa-arrows-spin text-indigo-500"></i> {t('setRecurringBudget')}</h3>
                  <button onClick={() => setRecurringSetup(null)} className="text-theme-muted hover:text-rose-500"><i className="fa-solid fa-xmark"></i></button>
                </div>
                <p className="text-xs text-theme-muted capitalize">{t('categories.' + recurringSetup.item).replace('categories.', '')}: <span className="font-bold text-theme-main">{formatCurrency(recurringSetup.value)}</span></p>
                <div className="space-y-2">
                  <label className="text-xs font-bold text-theme-muted uppercase tracking-wider">{t('durationInMonths')}</label>
                  <select value={recurringMonths} onChange={(e) => setRecurringMonths(parseInt(e.target.value))} className="w-full bg-theme-input border border-theme rounded-lg px-3 py-2 text-sm text-theme-main outline-none focus:border-indigo-500 transition font-semibold">
                    <option value={3}>3 {i18n.language === 'de' ? 'Monate' : 'months'}</option><option value={6}>6 {i18n.language === 'de' ? 'Monate' : 'months'}</option><option value={12}>12 {i18n.language === 'de' ? 'Monate' : 'months'}</option>
                  </select>
                </div>
                <div className="flex gap-2 pt-2">
                  <button onClick={() => setRecurringSetup(null)} className="flex-1 bg-theme-header hover:bg-theme-main border border-theme text-theme-main font-bold py-2 rounded-lg text-xs transition">Cancel</button>
                  <button onClick={async () => { await handleApplyRecurring(recurringSetup.type, recurringSetup.item, selectedMonth, selectedYear, recurringMonths, recurringSetup.value); setRecurringSetup(null); }} className="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2 rounded-lg text-xs transition">Apply</button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    function App() { return <LanguageProvider><MainAppContent /></LanguageProvider>; }
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').then(async (reg) => {
            if ('SyncManager' in window) try { await reg.sync.register('sync-budget'); } catch (e) { }
          }).catch(err => console.error('SW registration error:', err));
      });
    }
  </script>
</body>
</html>
