    const LanguageContext = createContext();

    function LanguageProvider({ children }) {
      const [lang, setLang] = useState(() => localStorage.getItem('budget_app_lang') || 'de');

      const changeLanguage = (newLang) => {
        setLang(newLang);
        localStorage.setItem('budget_app_lang', newLang);
      };

      const t = (path) => {
        const keys = path.split('.');
        let translation = translations[lang];
        for (const key of keys) {
          if (translation && translation[key] !== undefined) {
            translation = translation[key];
          } else {
            let fallback = translations['en'];
            for (const fallbackKey of keys) {
              if (fallback && fallback[fallbackKey] !== undefined) {
                fallback = fallback[fallbackKey];
              } else {
                fallback = null;
                break;
              }
            }
            return fallback || path;
          }
        }
        return translation;
      };

      return (
        <LanguageContext.Provider value={{ t, i18n: { language: lang, changeLanguage } }}>
          {children}
        </LanguageContext.Provider>
      );
    }

    const useTranslation = () => useContext(LanguageContext);

    // Initial basic structural state generator [1]
    const generateInitialState = () => {
      const state = {
        categories: {
          incomes: [...INITIAL_CATEGORIES.incomes],
          expenses: [...INITIAL_CATEGORIES.expenses]
        },
        values: {}
      };
      ["2026", "2027", "2028"].forEach(year => {
        state.values[year] = { incomes: {}, expenses: {} };
        state.categories.incomes.forEach(item => {
          state.values[year].incomes[item] = {};
          getMonthsForYear(parseInt(year)).forEach(m => state.values[year].incomes[item][m] = 0);
        });
        state.categories.expenses.forEach(item => {
          state.values[year].expenses[item] = {};
          getMonthsForYear(parseInt(year)).forEach(m => state.values[year].expenses[item][m] = 0);
        });
      });
      return state;
    };

    // Non-destructive safe merging logic [1]
    const mergeAndLockState = (loadedState) => {
      if (!loadedState) return generateInitialState();

      const merged = {
        categories: {
          incomes: [...(loadedState.categories?.incomes || INITIAL_CATEGORIES.incomes)],
          expenses: [...(loadedState.categories?.expenses || INITIAL_CATEGORIES.expenses)]
        },
        values: { ...(loadedState.values || {}) }
      };

      // Non-destructively append any missing base categories to ensure safe structural initialization
      INITIAL_CATEGORIES.incomes.forEach(item => {
        if (!merged.categories.incomes.includes(item)) {
          merged.categories.incomes.push(item);
        }
      });
      INITIAL_CATEGORIES.expenses.forEach(item => {
        if (!merged.categories.expenses.includes(item)) {
          merged.categories.expenses.push(item);
        }
      });

      // Synchronize month properties safely across active year scopes
      ["2026", "2027", "2028"].forEach(year => {
        if (!merged.values[year]) {
          merged.values[year] = { incomes: {}, expenses: {} };
        }
        if (!merged.values[year].incomes) merged.values[year].incomes = {};
        if (!merged.values[year].expenses) merged.values[year].expenses = {};

        merged.categories.incomes.forEach(item => {
          if (!merged.values[year].incomes[item]) {
            merged.values[year].incomes[item] = {};
          }
          getMonthsForYear(parseInt(year)).forEach(m => {
            if (merged.values[year].incomes[item][m] === undefined) {
              merged.values[year].incomes[item][m] = 0;
            }
          });
        });

        merged.categories.expenses.forEach(item => {
          if (!merged.values[year].expenses[item]) {
            merged.values[year].expenses[item] = {};
          }
          getMonthsForYear(parseInt(year)).forEach(m => {
            if (merged.values[year].expenses[item][m] === undefined) {
              merged.values[year].expenses[item][m] = 0;
            }
          });
        });
      });

      return merged;
    };

    // Local IndexedDB caching driver [1]
    const IDB = {
      dbName: 'BudgetDatabase_v2',
      dbVersion: 1,
      open() {
        return new Promise((resolve, reject) => {
          const request = indexedDB.open(this.dbName, this.dbVersion);
          request.onupgradeneeded = (e) => {
            const database = e.target.result;
            if (!database.objectStoreNames.contains('state')) {
              database.createObjectStore('state', { keyPath: 'id' });
            }
            if (!database.objectStoreNames.contains('queue')) {
              database.createObjectStore('queue', { keyPath: 'id' });
            }
          };
          request.onsuccess = (e) => resolve(e.target.result);
          request.onerror = (e) => reject(e.target.error);
        });
      },
      async get(storeName, key) {
        const database = await this.open();
        return new Promise((resolve, reject) => {
          const tx = database.transaction(storeName, 'readonly');
          const store = tx.objectStore(storeName);
          const request = store.get(key);
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
      },
      async set(storeName, value) {
        const database = await this.open();
        return new Promise((resolve, reject) => {
          const tx = database.transaction(storeName, 'readwrite');
          const store = tx.objectStore(storeName);
          const request = store.put(value);
          request.onsuccess = () => resolve();
          request.onerror = () => reject(request.error);
        });
      },
      async delete(storeName, key) {
        const database = await this.open();
        return new Promise((resolve, reject) => {
          const tx = database.transaction(storeName, 'readwrite');
          const store = tx.objectStore(storeName);
          const request = store.delete(key);
          request.onsuccess = () => resolve();
          request.onerror = () => reject(request.error);
        });
      }
    };

        const validMonths = getMonthsForYear(selectedYear);
        if (!validMonths.includes(selectedMonth)) {
          setSelectedMonth(validMonths[0]);
        }
      }, [selectedYear]);

      // Seed local cache safely, subscribe securely to frozen cloud paths [1, 3]
      useEffect(() => {
        async function loadInitialData() {
          try {
            const cached = await IDB.get('state', 'budget_data');
            if (cached) {
              setData(mergeAndLockState(cached.payload));
            }
          } catch (e) {
            console.warn("Failed to load local IndexedDB state", e);
          }
        }
        loadInitialData();

        // Lock database references to prevent structural siloing [1]
        const unsubscribe = db.collection('monthly_logs').doc('house_finanzen_state')
          .onSnapshot(async (doc) => {
            if (doc.exists) {
              const remote = doc.data();
              const localCached = await IDB.get('state', 'budget_data');
              
              // Apply remote configurations only if remote is chronologically newer [1]
              if (!localCached || remote.updatedAt > localCached.updatedAt) {
                const merged = mergeAndLockState(remote.payload);
                setData(merged);
                await IDB.set('state', { id: 'budget_data', payload: merged, updatedAt: remote.updatedAt });
                setSyncStatus("synced");
              }
            }
          }, (err) => {
            console.warn("Firestore connection offline or restricted:", err);
          });

        return () => unsubscribe();
      }, []);

      // Connectivity sync triggers [2]
      useEffect(() => {
        const handleOnline = async () => {
          setIsOnline(true);
          await triggerLocalToCloudSync();
        };
        const handleOffline = () => setIsOnline(false);

        window.addEventListener('online', handleOnline);
        window.addEventListener('offline', handleOffline);
        return () => {
          window.removeEventListener('online', handleOnline);
          window.removeEventListener('offline', handleOffline);

            labels: translatedLabels,
            datasets: [

                label: t('incomesHeader'),
                data: incomeData,
                backgroundColor: '#10b981', 
                stack: 'Stack0',
                borderRadius: 4,
              },

                label: t('bracketHousing'),
                data: monthsForYear.map(m => getBracketMonthlyTotal('housing', m)),
                backgroundColor: '#475569', 
                stack: 'Stack1',
                borderRadius: 4,

                borderRadius: 4,

                data: monthsForYear.map(m => getBracketMonthlyTotal('professional', m)),
                backgroundColor: '#14b8a6', 
                stack: 'Stack1',
                borderRadius: 4,
              }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
              y: {
                beginAtZero: true,
                ticks: {
                  callback: function(value) {
                    return value.toLocaleString(i18n.language === 'de' ? 'de-DE' : 'en-US', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 });
                  }
                }
              }
            },
            plugins: {
              tooltip: {
                callbacks: {
                  label: function(context) {
                    let label = context.dataset.label || '';
                    if (label) label += ': ';
                    if (context.parsed.y !== null) {
                      label += new Intl.NumberFormat(i18n.language === 'de' ? 'de-DE' : 'en-US', { style: 'currency', currency: 'EUR' }).format(context.parsed.y);
                    }
                    return label;
                  }
                }
              }
            }
          }
        });

        return () => {
          if (chartInstanceRef.current) {
            chartInstanceRef.current.destroy();
          }
        };

      const triggerLocalToCloudSync = async () => {
        setSyncStatus("syncing");
        try {
          const queueItem = await IDB.get('queue', 'pending_sync');
          if (queueItem) {
            const docRef = db.collection('monthly_logs').doc('house_finanzen_state');
            const doc = await docRef.get();
            if (!doc.exists || queueItem.updatedAt > doc.data().updatedAt) {
              await docRef.set({
                payload: queueItem.payload,
                updatedAt: queueItem.updatedAt
              });
            }
            await IDB.delete('queue', 'pending_sync');
          }
          setSyncStatus("synced");
        } catch (e) {
          setSyncStatus("pending_sync");
        }
      };

      const saveStateAndDispatch = async (updatedData, timestamp) => {
        setData(updatedData);
        await IDB.set('state', { id: 'budget_data', payload: updatedData, updatedAt: timestamp });
        await IDB.set('queue', { id: 'pending_sync', payload: updatedData, updatedAt: timestamp });

        if (navigator.onLine) {
          setSyncStatus("syncing");
          try {
            await db.collection('monthly_logs').doc('house_finanzen_state').set({
              payload: updatedData,
              updatedAt: timestamp
            });
            await IDB.delete('queue', 'pending_sync');
            setSyncStatus("synced");
          } catch (e) {
            setSyncStatus("pending_sync");
          }
        } else {
          setSyncStatus("pending_sync");
          if ('serviceWorker' in navigator && 'SyncManager' in window) {
            const reg = await navigator.serviceWorker.ready;
            try {
              await reg.sync.register('sync-budget');
            } catch (err) {
              console.warn("Background Sync registration rejected: ", err);
            }
          }
        }

        }
        if (!updatedData.values[selectedYear][type][posten]) {
          updatedData.values[selectedYear][type][posten] = {};
        }
        updatedData.values[selectedYear][type][posten][month] = updatedVal;

        await saveStateAndDispatch(updatedData, Date.now());
      };

      const handleAddCategory = async (type, name, inputSetter) => {
        if (!name.trim()) return;
        const trimmedName = name.trim();

        if (data.categories[type].includes(trimmedName)) {
          alert(t('duplicateCategoryAlert'));
          return;
        }

        const updatedCategories = {
          ...data.categories,
          [type]: [...data.categories[type], trimmedName]
        };

        const updatedValues = { ...data.values };
        Object.keys(updatedValues).forEach(y => {
          if (!updatedValues[y][type][trimmedName]) {
            updatedValues[y][type][trimmedName] = {};
          }
          getMonthsForYear(parseInt(y)).forEach(m => {
            if (updatedValues[y][type][trimmedName][m] === undefined) {
              updatedValues[y][type][trimmedName][m] = 0;
            }
          });
        });

        const updatedData = {
          categories: updatedCategories,
          values: updatedValues
        };

        inputSetter("");
        await saveStateAndDispatch(updatedData, Date.now());
      };

      // Secure Category Deletion Engine with Historical Data Preservation [1, 2]
      const handleDeleteCategory = async (type, item) => {
        const key = t(`categories.${item}`);
        let cleanName = key.replace('categories.', '');
        cleanName = cleanName.charAt(0).toUpperCase() + cleanName.slice(1);

        const confirmMsg = t('deleteConfirmation').replace('{{name}}', cleanName);
        if (!window.confirm(confirmMsg)) return;

        const updatedData = { ...data };
        const fallbackKey = "Sonstiges";

        // Check if category holds non-zero values across years and months [2]
        let hasData = false;
        Object.keys(updatedData.values).forEach(year => {
          const yearVals = updatedData.values[year]?.[type]?.[item];
          if (yearVals) {
            Object.keys(yearVals).forEach(month => {
              if (yearVals[month] !== 0) {
                hasData = true;
              }
            });
          }
        });

        // Other Fallback data migration logic [2]
        if (hasData) {
          Object.keys(updatedData.values).forEach(year => {
            if (!updatedData.values[year][type][fallbackKey]) {
              updatedData.values[year][type][fallbackKey] = {};
              getMonthsForYear(parseInt(year)).forEach(m => {
                updatedData.values[year][type][fallbackKey][m] = 0;
              });
            }

            const deletedVals = updatedData.values[year]?.[type]?.[item] || {};
            getMonthsForYear(parseInt(year)).forEach(m => {
              const deletedVal = deletedVals[m] || 0;
              updatedData.values[year][type][fallbackKey][m] = (updatedData.values[year][type][fallbackKey][m] || 0) + deletedVal;
            });
          });
        }

        // Clean out schema structures securely [2]
        updatedData.categories[type] = updatedData.categories[type].filter(cat => cat !== item);
        Object.keys(updatedData.values).forEach(year => {
          if (updatedData.values[year]?.[type]) {
            delete updatedData.values[year][type][item];
          }
        });

        await saveStateAndDispatch(updatedData, Date.now());
      };

      const handleResetData = async () => {
        if (window.confirm(t('confirmClear'))) {
          const freshData = generateInitialState();
          await saveStateAndDispatch(freshData, Date.now());
        }
      };

      // Backup JSON utilities [2]
      const handleExportBackup = () => {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data, null, 2));
        const downloadAnchor = document.createElement('a');
        downloadAnchor.setAttribute("href", dataStr);
        downloadAnchor.setAttribute("download", `finanzen_backup_${selectedYear}.json`);
        document.body.appendChild(downloadAnchor);
        downloadAnchor.click();
        downloadAnchor.remove();
      };

      const handleImportBackup = (event) => {
        const fileReader = new FileReader();
        fileReader.onload = async (e) => {
          try {
            const importedState = JSON.parse(e.target.result);
            if (importedState && importedState.categories && importedState.values) {
              await saveStateAndDispatch(mergeAndLockState(importedState), Date.now());
              alert(t('importSuccess'));
            } else {
              alert(t('importError'));
            }
          } catch (err) {
            alert(t('importError'));
          }
        };
        if (event.target.files[0]) {
          fileReader.readAsText(event.target.files[0]);
        }
      };

      const triggerFileSelector = () => {
        if (fileInputRef.current) {
          fileInputRef.current.click();
        }
      };

      const formatCurrency = (val) => {
        return new Intl.NumberFormat(i18n.language === 'de' ? 'de-DE' : 'en-US', { 
          style: 'currency', 
          currency: 'EUR' 
        }).format(val || 0);
      };

      const getMonthlyTotal = (type, targetMonth) => {
        if (!data.values[selectedYear]) return 0;
        return data.categories[type].reduce((sum, posten) => {
          const val = data.values[selectedYear][type][posten]?.[targetMonth];
          return sum + (val || 0);
        }, 0);
      };

      const getBracketMonthlyTotal = (bracketKey, month) => {
        if (!data.values[selectedYear]) return 0;
        const items = data.categories.expenses.filter(posten => getExpenseBracket(posten) === bracketKey);
        return items.reduce((sum, posten) => {
          const val = data.values[selectedYear].expenses[posten]?.[month];
          return sum + (val || 0);
        }, 0);
      };

      const totalIncome = useMemo(() => getMonthlyTotal('incomes', selectedMonth), [data, selectedMonth, selectedYear]);
      const totalExpenses = useMemo(() => getMonthlyTotal('expenses', selectedMonth), [data, selectedMonth, selectedYear]);
      
      // Reactive Net Balance Calculation Engine [1]
      const saldo = useMemo(() => totalIncome - totalExpenses, [totalIncome, totalExpenses]);
      const percentageSpent = useMemo(() => {
        if (totalIncome === 0) return 0;
        return (totalExpenses / totalIncome) * 100;
      }, [totalIncome, totalExpenses]);

      // Annual Net Balance Calculation Engine [1]
      const yearlyNetBalance = useMemo(() => {
        let totalIncomesYear = 0;
        let totalExpensesYear = 0;
        const yearData = data.values[selectedYear];
        if (!yearData) return 0;

        const monthsForYear = getMonthsForYear(selectedYear);

        // Sum Incomes for the year [1]
        if (yearData.incomes) {
          data.categories.incomes.forEach(category => {
            const monthsData = yearData.incomes[category];
            if (monthsData) {
              monthsForYear.forEach(m => {
                totalIncomesYear += parseFloat(monthsData[m]) || 0;
              });
            }
          });

        // Sum Expenses for the year [1]
        if (yearData.expenses) {
          data.categories.expenses.forEach(category => {
            const monthsData = yearData.expenses[category];
            if (monthsData) {
              monthsForYear.forEach(m => {
                totalExpensesYear += parseFloat(monthsData[m]) || 0;
              });
            }
          });
        }

        return totalIncomesYear - totalExpensesYear;
      }, [data, selectedYear]);

      // Cumulative Global Net Balance Calculation Engine [1]
      const overallNetBalance = useMemo(() => {
        let totalIncomesGlobal = 0;
        let totalExpensesGlobal = 0;

        Object.keys(data.values).forEach(year => {
          const yearData = data.values[year];
          if (!yearData) return;

          // Global Incomes Accumulation [1]
          if (yearData.incomes) {
            data.categories.incomes.forEach(category => {
              const monthsData = yearData.incomes[category];
              if (monthsData) {
                Object.keys(monthsData).forEach(m => {
                  totalIncomesGlobal += parseFloat(monthsData[m]) || 0;
                });
              }
            });
          }

          // Global Expenses Accumulation [1]
          if (yearData.expenses) {
            data.categories.expenses.forEach(category => {
              const monthsData = yearData.expenses[category];
              if (monthsData) {
                Object.keys(monthsData).forEach(m => {
                  totalExpensesGlobal += parseFloat(monthsData[m]) || 0;
                });
              }
            });
          }
        });

        return totalIncomesGlobal - totalExpensesGlobal;
      }, [data]);

      const getItemStats = (type, posten) => {
        const monthsForYear = getMonthsForYear(selectedYear);
        const ytdTotal = monthsForYear.reduce((sum, m) => {
          const val = data.values[selectedYear]?.[type]?.[posten]?.[m];
          return sum + (val || 0);
        }, 0);
        const average = ytdTotal / monthsForYear.length;
        return { ytdTotal, average };

      return (

            <div className="flex bg-slate-200/60 p-1 rounded-xl max-w-sm mx-auto shadow-inner">

            {/* Side-by-Side Grouped Stacked Analytics Chart [2] */}

                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-100 text-sm">
                      {data.categories.incomes.map((item) => {
                        const { ytdTotal, average } = getItemStats('incomes', item);
                        const val = data.values[selectedYear]?.incomes[item]?.[selectedMonth];
                        
                        // Database Object Parsing sanitation step
                        const key = t(`categories.${item}`);
                        let cleanName = key.replace('categories.', '');
                        cleanName = cleanName.charAt(0).toUpperCase() + cleanName.slice(1);

                        // Deletion identification check
                        const isCustom = !INITIAL_CATEGORIES.incomes.includes(item);

                        return (
                          <tr key={item} className="hover:bg-slate-50 transition border-l-4 border-emerald-500">
                            <td className="p-3 font-medium text-slate-700 flex items-center justify-between group">
                              <span>{cleanName}</span>
                              {isCustom && activeTab === "edit" && (
                                <button 
                                  onClick={() => handleDeleteCategory('incomes', item)}
                                  className="text-slate-400 hover:text-rose-600 transition p-1 opacity-0 group-hover:opacity-100 focus:opacity-100 ml-2"
                                  title={i18n.language === 'de' ? 'Kategorie löschen' : 'Delete category'}
                                >
                                  <i className="fa-solid fa-trash-can text-xs"></i>
                                </button>
                              )}
                            </td>
                            <td className="p-3 text-right">
                              {activeTab === "view" ? (
                                <span className="font-bold text-slate-700 block pr-2">{formatCurrency(val || 0)}</span>
                              ) : (
                                <input
                                  type="number"
                                  step="any"
                                  value={val !== undefined && val !== 0 ? val : ''}
                                  placeholder="0"
                                  onChange={(e) => handleValueChange('incomes', item, selectedMonth, e.target.value)}
                                  className="w-full text-right bg-slate-50 focus:bg-white border border-slate-200 focus:border-indigo-500 rounded px-2 py-1 outline-none font-semibold transition"
                                />
                              )}
                            </td>
                            <td className="p-3 text-right text-slate-600 font-medium">{formatCurrency(ytdTotal)}</td>
                            <td className="p-3 text-right text-slate-500 text-xs">{formatCurrency(average)}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>

                {activeTab === "edit" && (
                  <div className="p-3 bg-slate-50 border-t border-slate-100 flex gap-2">
                    <input
                      type="text"
                      value={customIncomeInput}
                      onChange={(e) => setCustomIncomeInput(e.target.value)}
                      placeholder={t('addPlaceholder')}
                      className="flex-grow bg-white border border-slate-200 rounded px-3 py-1.5 text-sm outline-none focus:border-indigo-500 transition"
                    />
                    <button
                      onClick={() => handleAddCategory('incomes', customIncomeInput, setCustomIncomeInput)}
                      className="bg-indigo-600 hover:bg-indigo-500 text-white text-xs px-4 py-2 rounded-lg font-bold transition flex items-center gap-1 shrink-0"
                    >
                      <i className="fa-solid fa-plus"></i> Add
                    </button>
                  </div>
                )}
              </section>

              {/* TABLE B: AUSGABEN */}
              <section className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden flex flex-col">
                <div className="p-4 border-b border-slate-200 bg-rose-50/50 flex items-center justify-between">
                  <h3 className="text-lg font-bold text-rose-900 flex items-center gap-2">
                    <i className="fa-solid fa-cart-shopping text-rose-600"></i> {t('expensesHeader')}
                  </h3>
                  <span className="text-xs font-semibold px-2.5 py-1 bg-rose-100 text-rose-800 rounded-full">
                    {t('sum')}: {formatCurrency(totalExpenses)}
                  </span>
                </div>
                <div className="overflow-x-auto max-h-[500px] overflow-y-auto flex-grow">
                  <table className="w-full text-left border-collapse">
                    <thead className="sticky top-0 bg-slate-100 border-b border-slate-200 text-xs font-semibold text-slate-600 uppercase z-10">
                      <tr>
                        <th className="p-3 bg-slate-100">{t('posten')}</th>
                        <th className="p-3 w-32 text-right bg-slate-100">{t(`months.${selectedMonth}`)} (€)</th>
                        <th className="p-3 w-28 text-right bg-slate-100">{t('resultYtd')}</th>
                        <th className="p-3 w-28 text-right bg-slate-100">{t('avgSchnitt')}</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-100 text-sm">
                      {data.categories.expenses.map((item) => {
                        const { ytdTotal, average } = getItemStats('expenses', item);
                        const val = data.values[selectedYear]?.expenses[item]?.[selectedMonth];
                        
                        // dynamic left-border tags mapped by category bracket
                        const bracket = getExpenseBracket(item);
                        const borderClass = 
                          bracket === 'housing' ? 'border-l-4 border-slate-500' : 
                          bracket === 'living' ? 'border-l-4 border-amber-500' :  
                          bracket === 'professional' ? 'border-l-4 border-teal-500' : 
                          'border-l-4 border-indigo-500'; 

                        // Database Object Parsing sanitation step
                        const key = t(`categories.${item}`);
                        let cleanName = key.replace('categories.', '');
                        cleanName = cleanName.charAt(0).toUpperCase() + cleanName.slice(1);

                        // Deletion identification check
                        const isCustom = !INITIAL_CATEGORIES.expenses.includes(item);

                        return (
                          <tr key={item} className={`hover:bg-slate-50 transition ${borderClass}`}>
                            <td className="p-3 font-medium text-slate-700 flex items-center justify-between group">
                              <span>{cleanName}</span>
                              {isCustom && activeTab === "edit" && (
                                <button 
                                  onClick={() => handleDeleteCategory('expenses', item)}
                                  className="text-slate-400 hover:text-rose-600 transition p-1 opacity-0 group-hover:opacity-100 focus:opacity-100 ml-2"
                                  title={i18n.language === 'de' ? 'Kategorie löschen' : 'Delete category'}
                                >
                                  <i className="fa-solid fa-trash-can text-xs"></i>
                                </button>
                              )}
                            </td>
                            <td className="p-3 text-right font-semibold">
                              {activeTab === "view" ? (
                                <span className="font-bold text-slate-700 block pr-2">{formatCurrency(val || 0)}</span>
                              ) : (
                                <input
                                  type="number"
                                  step="any"
                                  value={val !== undefined && val !== 0 ? val : ''}
                                  placeholder="0"
                                  onChange={(e) => handleValueChange('expenses', item, selectedMonth, e.target.value)}
                                  className="w-full text-right bg-slate-50 focus:bg-white border border-slate-200 focus:border-indigo-500 rounded px-2 py-1 outline-none font-semibold transition"
                                />
                              )}
                            </td>
                            <td className="p-3 text-right text-slate-600 font-medium">{formatCurrency(ytdTotal)}</td>
                            <td className="p-3 text-right text-slate-500 text-xs">{formatCurrency(average)}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>

                {activeTab === "edit" && (
                  <div className="p-3 bg-slate-50 border-t border-slate-100 flex gap-2">
                    <input
                      type="text"
                      value={customExpenseInput}
                      onChange={(e) => setCustomExpenseInput(e.target.value)}
                      placeholder={t('addPlaceholder')}
                      className="flex-grow bg-white border border-slate-200 rounded px-3 py-1.5 text-sm outline-none focus:border-indigo-500 transition"
                    />
                    <button
                      onClick={() => handleAddCategory('expenses', customExpenseInput, setCustomExpenseInput)}
                      className="bg-indigo-600 hover:bg-indigo-500 text-white text-xs px-4 py-2 rounded-lg font-bold transition flex items-center gap-1 shrink-0"
                    >
                      <i className="fa-solid fa-plus"></i> Add
                    </button>
                  </div>
                )}
              </section>

            </div>
          </main>
        </div>
      );
    }

    function App() {
      return (
        <LanguageProvider>
          <MainAppContent />
        </LanguageProvider>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(async (reg) => {
            if ('SyncManager' in window) {
              try {
                await reg.sync.register('sync-budget');
              } catch (e) {
                console.warn('Sync registration failed: ', e);
              }
            }
          })
          .catch(err => console.error('SW registration error:', err));
      });
    }
  </script>
</body>
</html>
