    const LanguageContext = createContext();

    function LanguageProvider({ children }) {
      const [lang, setLang] = useState(() => localStorage.getItem('budget_app_lang') || 'de');

      const changeLanguage = (newLang) => {
        setLang(newLang);
        localStorage.setItem('budget_app_lang', newLang);
      };

      const t = (path) => {
        const keys = path.split('.');
        let translation = translations[lang];
        for (const key of keys) {
          if (translation && translation[key] !== undefined) {
            translation = translation[key];
          } else {
            let fallback = translations['en'];
            for (const fallbackKey of keys) {
              if (fallback && fallback[fallbackKey] !== undefined) {
                fallback = fallback[fallbackKey];
              } else {
                fallback = null;
                break;
              }
            }
            return fallback || path;
          }
        }
        return translation;
      };

      return (
        <LanguageContext.Provider value={{ t, i18n: { language: lang, changeLanguage } }}>
          {children}
        </LanguageContext.Provider>
      );
    }

    // Initial basic structural state generator [1]
    const generateInitialState = () => {
      const state = {
        categories: {
          incomes: [...INITIAL_CATEGORIES.incomes],
          expenses: [...INITIAL_CATEGORIES.expenses]
        },
        values: {},
        initialSavingsBase: 5000, 
        categoryOverrides: {}

      ["2026", "2027", "2028"].forEach(year => {
        state.values[year] = { incomes: {}, expenses: {} };
        state.categories.incomes.forEach(item => {
          state.values[year].incomes[item] = {};
          getMonthsForYear(parseInt(year)).forEach(m => state.values[year].incomes[item][m] = 0);
        });
        state.categories.expenses.forEach(item => {
          state.values[year].expenses[item] = {};
          getMonthsForYear(parseInt(year)).forEach(m => state.values[year].expenses[item][m] = 0);
        });
      });
      return state;
    };

    // Non-destructive safe merging logic [1]
    const mergeAndLockState = (loadedState) => {
      if (!loadedState) return generateInitialState();

      const merged = {
        categories: {
          incomes: [...(loadedState.categories?.incomes || INITIAL_CATEGORIES.incomes)],
          expenses: [...(loadedState.categories?.expenses || INITIAL_CATEGORIES.expenses)]
        },
        values: { ...(loadedState.values || {}) },
        initialSavingsBase: loadedState.initialSavingsBase !== undefined ? loadedState.initialSavingsBase : 5000,
        categoryOverrides: loadedState.categoryOverrides || {}
      };

      // Non-destructively append any missing base categories to ensure safe structural initialization
      INITIAL_CATEGORIES.incomes.forEach(item => {
        if (!merged.categories.incomes.includes(item)) {
          merged.categories.incomes.push(item);
        }
      });
      INITIAL_CATEGORIES.expenses.forEach(item => {
        if (!merged.categories.expenses.includes(item)) {
          merged.categories.expenses.push(item);
        }
      });

      // Synchronize month properties safely across active year scopes
      ["2026", "2027", "2028"].forEach(year => {
        if (!merged.values[year]) {
          merged.values[year] = { incomes: {}, expenses: {} };
        }
        if (!merged.values[year].incomes) merged.values[year].incomes = {};
        if (!merged.values[year].expenses) merged.values[year].expenses = {};

        merged.categories.incomes.forEach(item => {
          if (!merged.values[year].incomes[item]) {
            merged.values[year].incomes[item] = {};
          }
          getMonthsForYear(parseInt(year)).forEach(m => {
            if (merged.values[year].incomes[item][m] === undefined) {
              merged.values[year].incomes[item][m] = 0;
            }
          });
        });

        merged.categories.expenses.forEach(item => {
          if (!merged.values[year].expenses[item]) {
            merged.values[year].expenses[item] = {};
          }
          getMonthsForYear(parseInt(year)).forEach(m => {
            if (merged.values[year].expenses[item][m] === undefined) {
              merged.values[year].expenses[item][m] = 0;
            }
          });
        });
      });

      return merged;
    };

    // Local IndexedDB caching driver [1]
    const IDB = {
      dbName: 'BudgetDatabase_v2',
      dbVersion: 1,
      open() {
        return new Promise((resolve, reject) => {
          const request = indexedDB.open(this.dbName, this.dbVersion);
          request.onupgradeneeded = (e) => {
            const database = e.target.result;
            if (!database.objectStoreNames.contains('state')) {
              database.createObjectStore('state', { keyPath: 'id' });
            }
            if (!database.objectStoreNames.contains('queue')) {
              database.createObjectStore('queue', { keyPath: 'id' });
            }
          };
          request.onsuccess = (e) => resolve(e.target.result);
          request.onerror = (e) => reject(e.target.error);
        });
      },
      async get(storeName, key) {
        const database = await this.open();
        return new Promise((resolve, reject) => {
          const tx = database.transaction(storeName, 'readonly');
          const store = tx.objectStore(storeName);
          const request = store.get(key);
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
      },
      async set(storeName, value) {
        const database = await this.open();
        return new Promise((resolve, reject) => {
          const tx = database.transaction(storeName, 'readwrite');
          const store = tx.objectStore(storeName);
          const request = store.put(value);
          request.onsuccess = () => resolve();
          request.onerror = () => reject(request.error);
        });
      },
      async delete(storeName, key) {
        const database = await this.open();
        return new Promise((resolve, reject) => {
          const tx = database.transaction(storeName, 'readwrite');
          const store = tx.objectStore(storeName);
          const request = store.delete(key);
          request.onsuccess = () => resolve();
          request.onerror = () => reject(request.error);
        });
      }
    };

          });
        });

        if (startIndex !== -1) {
          for (let i = 0; i < monthsCount; i++) {
            const targetIndex = startIndex + i;
            if (targetIndex < timeline.length) {
              const { year, month } = timeline[targetIndex];
              if (!updatedData.values[year]) {
                updatedData.values[year] = { incomes: {}, expenses: {} };
              }
              if (!updatedData.values[year][type][item]) {
                updatedData.values[year][type][item] = {};

          const temp = categories[index];
          categories[index] = categories[index - 1];
          categories[index - 1] = temp;
        } else if (direction === 'down' && index < categories.length - 1) {
          const temp = categories[index];
          categories[index] = categories[index + 1];
          categories[index + 1] = temp;
        } else {

                </div>
                <p className="text-xs text-slate-500 dark:text-zinc-400 capitalize">
                  {t('categories.' + recurringSetup.item).replace('categories.', '')}: <span className="font-bold text-slate-700 dark:text-zinc-200">{formatCurrency(recurringSetup.value)}</span>
                </p>
                <div className="space-y-2">
                  <label className="text-xs font-bold text-slate-400 dark:text-zinc-500 uppercase tracking-wider">{t('durationInMonths')}</label>
                  <select
                    value={recurringMonths}
                    onChange={(e) => setRecurringMonths(parseInt(e.target.value))}
                    className="w-full bg-slate-50 dark:bg-zinc-800 border border-slate-200 dark:border-zinc-700 rounded-lg px-3 py-2 text-sm text-slate-800 dark:text-zinc-100 outline-none focus:border-indigo-500 transition font-semibold"
                  >
                    <option value={3}>3 {i18n.language === 'de' ? 'Monate' : 'months'}</option>
                    <option value={6}>6 {i18n.language === 'de' ? 'Monate' : 'months'}</option>
                    <option value={12}>12 {i18n.language === 'de' ? 'Monate' : 'months'}</option>
                  </select>
                </div>
                <div className="flex gap-2 pt-2">
                  <button
                    onClick={() => setRecurringSetup(null)}
                    className="flex-1 bg-slate-100 dark:bg-zinc-800 hover:bg-slate-200 dark:hover:bg-zinc-700 text-slate-600 dark:text-zinc-300 font-bold py-2 rounded-lg text-xs transition"
                  >
                    Cancel
                  </button>
                  <button
                    onClick={async () => {
                      await handleApplyRecurring(recurringSetup.type, recurringSetup.item, selectedMonth, selectedYear, recurringMonths, recurringSetup.value);
                      setRecurringSetup(null);
                    }}
                    className="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2 rounded-lg text-xs transition"
                  >
                    Apply
                  </button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    function App() {
      return (
        <LanguageProvider>
          <MainAppContent />
        </LanguageProvider>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(async (reg) => {
            if ('SyncManager' in window) {
              try {
                await reg.sync.register('sync-budget');
              } catch (e) {
                console.warn('Sync registration failed: ', e);
              }
            }
          })
          .catch(err => console.error('SW registration error:', err));
      });
    }
  </script>
</body>
</html>
