    const LanguageContext = createContext();

    function LanguageProvider({ children }) {
      const [lang, setLang] = useState(() => localStorage.getItem('budget_app_lang') || 'de');

      const changeLanguage = (newLang) => {
        setLang(newLang);
        localStorage.setItem('budget_app_lang', newLang);
      };

      const t = (path) => {
        const keys = path.split('.');
        let translation = translations[lang];
        for (const key of keys) {
          if (translation && translation[key] !== undefined) {
            translation = translation[key];
          } else {
            let fallback = translations['en'];
            for (const fallbackKey of keys) {
              if (fallback && fallback[fallbackKey] !== undefined) {
                fallback = fallback[fallbackKey];
              } else {
                fallback = null;
                break;
              }
            }
            return fallback || path;
          }
        }
        return translation;
      };

      return (
        <LanguageContext.Provider value={{ t, i18n: { language: lang, changeLanguage } }}>
          {children}
        </LanguageContext.Provider>
      );
    }

    const useTranslation = () => useContext(LanguageContext);

    // Multi-Year database layout generator
    const generateInitialState = () => {
      const state = {
        categories: {
          incomes: [...INITIAL_CATEGORIES.incomes],
          expenses: [...INITIAL_CATEGORIES.expenses]
        },
        values: {}
      };
      // Populate 2026, 2027, and 2028 explicitly on initialization
      ["2026", "2027", "2028"].forEach(year => {
        state.values[year] = { incomes: {}, expenses: {} };
        state.categories.incomes.forEach(item => {
          state.values[year].incomes[item] = {};
          getMonthsForYear(parseInt(year)).forEach(m => state.values[year].incomes[item][m] = 0);
        });
        state.categories.expenses.forEach(item => {
          state.values[year].expenses[item] = {};
          getMonthsForYear(parseInt(year)).forEach(m => state.values[year].expenses[item][m] = 0);
        });
      });
      return state;
    };

    // State Migration to avoid compatibility errors with previous versions
    const migrateData = (oldData) => {
      if (oldData && oldData.values && oldData.categories) {
        return oldData;
      }
      const newState = generateInitialState();
      if (oldData && oldData.incomes && oldData.expenses) {
        Object.keys(oldData.incomes).forEach(item => {
          if (!newState.categories.incomes.includes(item)) {
            newState.categories.incomes.push(item);
          }
          newState.values["2026"].incomes[item] = {};
          getMonthsForYear(2026).forEach(m => {
            newState.values["2026"].incomes[item][m] = oldData.incomes[item][m] || 0;
          });
        });
        Object.keys(oldData.expenses).forEach(item => {
          if (!newState.categories.expenses.includes(item)) {
            newState.categories.expenses.push(item);
          }
          newState.values["2026"].expenses[item] = {};
          getMonthsForYear(2026).forEach(m => {
            newState.values["2026"].expenses[item][m] = oldData.expenses[item][m] || 0;
          });
        });
      }
      return newState;
    };

    // IndexedDB Caching Client [1]
    const IDB = {
      dbName: 'BudgetDatabase_v2',
      dbVersion: 1,
      open() {
        return new Promise((resolve, reject) => {
          const request = indexedDB.open(this.dbName, this.dbVersion);
          request.onupgradeneeded = (e) => {
            const database = e.target.result;
            if (!database.objectStoreNames.contains('state')) {
              database.createObjectStore('state', { keyPath: 'id' });
            }
            if (!database.objectStoreNames.contains('queue')) {
              database.createObjectStore('queue', { keyPath: 'id' });
            }
          };
          request.onsuccess = (e) => resolve(e.target.result);
          request.onerror = (e) => reject(e.target.error);
        });
      },
      async get(storeName, key) {
        const database = await this.open();
        return new Promise((resolve, reject) => {
          const tx = database.transaction(storeName, 'readonly');
          const store = tx.objectStore(storeName);
          const request = store.get(key);
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error);
        });
      },
      async set(storeName, value) {
        const database = await this.open();
        return new Promise((resolve, reject) => {
          const tx = database.transaction(storeName, 'readwrite');
          const store = tx.objectStore(storeName);
          const request = store.put(value);
          request.onsuccess = () => resolve();
          request.onerror = () => reject(request.error);
        });
      },
      async delete(storeName, key) {
        const database = await this.open();
        return new Promise((resolve, reject) => {
          const tx = database.transaction(storeName, 'readwrite');
          const store = tx.objectStore(storeName);
          const request = store.delete(key);
          request.onsuccess = () => resolve();
          request.onerror = () => reject(request.error);
        });
      }
    };

    function MainAppContent() {
      const { t, i18n } = useTranslation();
      const [data, setData] = useState(generateInitialState());
      const [selectedYear, setSelectedYear] = useState(2026);
      const [selectedMonth, setSelectedMonth] = useState("Jun");
      const [isOnline, setIsOnline] = useState(navigator.onLine);
      const [syncStatus, setSyncStatus] = useState("initialized");

      const [customIncomeInput, setCustomIncomeInput] = useState("");
      const [customExpenseInput, setCustomExpenseInput] = useState("");

      const chartRef = useRef(null);
      const chartInstanceRef = useRef(null);

      // Verify selected month availability when changing selectedYear [5]
      useEffect(() => {
        const validMonths = getMonthsForYear(selectedYear);
        if (!validMonths.includes(selectedMonth)) {
          setSelectedMonth(validMonths[0]);
        }
      }, [selectedYear]);

      // Handle Initial Setup and Real-time Snapshot sync from Firestore [1, 3]
      useEffect(() => {
        async function loadInitialData() {
          try {
            const cached = await IDB.get('state', 'budget_data');
            if (cached) {
              setData(migrateData(cached.payload));
            }
          } catch (e) {
            console.warn("Failed to load local database cache", e);
          }
        }
        loadInitialData();

        const unsubscribe = db.collection('budgets').doc('default_budget_v2')
          .onSnapshot(async (doc) => {
            if (doc.exists) {
              const remote = doc.data();
              const localCached = await IDB.get('state', 'budget_data');
              if (!localCached || remote.updatedAt > localCached.updatedAt) {
                const migrated = migrateData(remote.payload);
                setData(migrated);
                await IDB.set('state', { id: 'budget_data', payload: migrated, updatedAt: remote.updatedAt });
                setSyncStatus("synced");
              }
            }
          }, (err) => {
            console.warn("Firestore connection offline or restricted:", err);
          });

        return () => unsubscribe();
      }, []);

      // Online connectivity tracking and synchronization [2]
      useEffect(() => {
        const handleOnline = async () => {
          setIsOnline(true);
          await triggerLocalToCloudSync();
        };
        const handleOffline = () => setIsOnline(false);

        window.addEventListener('online', handleOnline);
        window.addEventListener('offline', handleOffline);
        return () => {
          window.removeEventListener('online', handleOnline);
          window.removeEventListener('offline', handleOffline);
        };
      }, [data]);

      // Charting Integration Layer
      useEffect(() => {
        if (!chartRef.current) return;
        const ctx = chartRef.current.getContext('2d');
        const monthsForYear = getMonthsForYear(selectedYear);

        const incomeData = monthsForYear.map(m => getMonthlyTotal('incomes', m));
        const expenseData = monthsForYear.map(m => getMonthlyTotal('expenses', m));
        const translatedLabels = monthsForYear.map(m => t(`months.${m}`));

        if (chartInstanceRef.current) {
          chartInstanceRef.current.destroy();
        }

        chartInstanceRef.current = new Chart(ctx, {
          type: 'bar',
          data: {
            labels: translatedLabels,
            datasets: [
              {
                label: t('incomesHeader'),
                data: incomeData,
                backgroundColor: '#10b981',
                borderRadius: 4,
              },
              {
                label: t('expensesHeader'),
                data: expenseData,
                backgroundColor: '#f43f5e',
                borderRadius: 4,
              }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
              y: {
                beginAtZero: true,
                ticks: {
                  callback: function(value) {
                    return value.toLocaleString(i18n.language === 'de' ? 'de-DE' : 'en-US', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 });
                  }
                }
              }
            },
            plugins: {
              tooltip: {
                callbacks: {
                  label: function(context) {
                    let label = context.dataset.label || '';
                    if (label) label += ': ';
                    if (context.parsed.y !== null) {
                      label += new Intl.NumberFormat(i18n.language === 'de' ? 'de-DE' : 'en-US', { style: 'currency', currency: 'EUR' }).format(context.parsed.y);
                    }
                    return label;
                  }
                }
              }
            }
          }
        });

        return () => {
          if (chartInstanceRef.current) {
            chartInstanceRef.current.destroy();
          }
        };
      }, [data, selectedYear, i18n.language]);

      const triggerLocalToCloudSync = async () => {
        setSyncStatus("syncing");
        try {
          const queueItem = await IDB.get('queue', 'pending_sync');
          if (queueItem) {
            const docRef = db.collection('budgets').doc('default_budget_v2');
            const doc = await docRef.get();
            if (!doc.exists || queueItem.updatedAt > doc.data().updatedAt) {
              await docRef.set({
                payload: queueItem.payload,
                updatedAt: queueItem.updatedAt
              });
            }
            await IDB.delete('queue', 'pending_sync');
          }
          setSyncStatus("synced");
        } catch (e) {
          setSyncStatus("pending_sync");
        }
      };

      const saveStateAndDispatch = async (updatedData, timestamp) => {
        setData(updatedData);
        await IDB.set('state', { id: 'budget_data', payload: updatedData, updatedAt: timestamp });
        await IDB.set('queue', { id: 'pending_sync', payload: updatedData, updatedAt: timestamp });

        if (navigator.onLine) {
          setSyncStatus("syncing");
          try {
            await db.collection('budgets').doc('default_budget_v2').set({
              payload: updatedData,
              updatedAt: timestamp
            });
            await IDB.delete('queue', 'pending_sync');
            setSyncStatus("synced");
          } catch (e) {
            setSyncStatus("pending_sync");
          }
        } else {
          setSyncStatus("pending_sync");
          if ('serviceWorker' in navigator && 'SyncManager' in window) {
            const reg = await navigator.serviceWorker.ready;
            try {
              await reg.sync.register('sync-budget');
            } catch (err) {
              console.warn("Background Sync registration rejected: ", err);
            }
          }
        }
      };

      const handleValueChange = async (type, posten, month, val) => {
        const parsedValue = val === '' ? 0 : parseFloat(val);
        const updatedVal = isNaN(parsedValue) ? 0 : parsedValue;

        const updatedData = { ...data };
        if (!updatedData.values[selectedYear]) {
          updatedData.values[selectedYear] = { incomes: {}, expenses: {} };
        }
        if (!updatedData.values[selectedYear][type][posten]) {
          updatedData.values[selectedYear][type][posten] = {};
        }
        updatedData.values[selectedYear][type][posten][month] = updatedVal;

        await saveStateAndDispatch(updatedData, Date.now());
      };

      // Custom Category Extensibility [6]
      const handleAddCategory = async (type, name, inputSetter) => {
        if (!name.trim()) return;
        const trimmedName = name.trim();

        if (data.categories[type].includes(trimmedName)) {
          alert(t('duplicateCategoryAlert'));
          return;
        }

        const updatedCategories = {
          ...data.categories,
          [type]: [...data.categories[type], trimmedName]
        };

        const updatedValues = { ...data.values };
        Object.keys(updatedValues).forEach(y => {
          if (!updatedValues[y][type][trimmedName]) {
            updatedValues[y][type][trimmedName] = {};
          }
          getMonthsForYear(parseInt(y)).forEach(m => {
            if (updatedValues[y][type][trimmedName][m] === undefined) {
              updatedValues[y][type][trimmedName][m] = 0;
            }
          });
        });

        const updatedData = {
          categories: updatedCategories,
          values: updatedValues
        };

        inputSetter("");
        await saveStateAndDispatch(updatedData, Date.now());
      };

      const handleResetData = async () => {
        if (window.confirm(t('confirmClear'))) {
          const freshData = generateInitialState();
          await saveStateAndDispatch(freshData, Date.now());
        }
      };

      const formatCurrency = (val) => {
        return new Intl.NumberFormat(i18n.language === 'de' ? 'de-DE' : 'en-US', { 
          style: 'currency', 
          currency: 'EUR' 
        }).format(val || 0);
      };

      const getMonthlyTotal = (type, targetMonth) => {
        if (!data.values[selectedYear]) return 0;
        return data.categories[type].reduce((sum, posten) => {
          const val = data.values[selectedYear][type][posten]?.[targetMonth];
          return sum + (val || 0);
        }, 0);
      };

      const totalIncome = useMemo(() => getMonthlyTotal('incomes', selectedMonth), [data, selectedMonth, selectedYear]);
      const totalExpenses = useMemo(() => getMonthlyTotal('expenses', selectedMonth), [data, selectedMonth, selectedYear]);
      const saldo = useMemo(() => totalIncome - totalExpenses, [totalIncome, totalExpenses]);
      const percentageSpent = useMemo(() => {
        if (totalIncome === 0) return 0;
        return (totalExpenses / totalIncome) * 100;
      }, [totalIncome, totalExpenses]);

      const getItemStats = (type, posten) => {
        const monthsForYear = getMonthsForYear(selectedYear);
        const ytdTotal = monthsForYear.reduce((sum, m) => {
          const val = data.values[selectedYear]?.[type]?.[posten]?.[m];
          return sum + (val || 0);
        }, 0);
        // Average adjusts dynamically based on available months (8 months for 2026, 12 for 2027+) [5]
        const average = ytdTotal / monthsForYear.length;
        return { ytdTotal, average };
      };

      return (
        <div className="flex flex-col min-h-screen">
          {/* Header Layout */}
          <header className="bg-indigo-700 text-white shadow-md sticky top-0 z-40">
            <div className="max-w-7xl mx-auto px-4 py-3 flex flex-col sm:flex-row justify-between items-center gap-3">
              <div className="flex items-center space-x-2">
                <i className="fa-solid fa-wallet text-2xl"></i>
                <h1 className="text-xl font-bold tracking-tight">{t('title')}</h1>
              </div>

              {/* Navigation Filters & Toggles */}

                {/* Year Selection list */}
                <div className="flex items-center space-x-1 bg-indigo-800 rounded-lg p-1">
                  {[2026, 2027, 2028].map(yr => (
                    <button
                      key={yr}
                      onClick={() => setSelectedYear(yr)}
                      className={`px-2.5 py-1 rounded text-xs transition font-bold ${selectedYear === yr ? 'bg-indigo-600 text-white' : 'text-indigo-200 hover:text-white'}`}
                    >
                      {yr}
                    </button>
                  ))}
                </div>

                {/* Language Switch */}
                <div className="flex items-center space-x-1 bg-indigo-800 rounded-lg p-1">
                  <button 
                    onClick={() => i18n.changeLanguage('de')} 
                    className={`px-2 py-1 rounded text-xs transition font-bold ${i18n.language === 'de' ? 'bg-indigo-600 text-white' : 'text-indigo-200 hover:text-white'}`}
                  >
                    DE
                  </button>
                  <span className="text-indigo-400 text-xs font-bold">|</span>
                  <button 
                    onClick={() => i18n.changeLanguage('en')} 
                    className={`px-2 py-1 rounded text-xs transition font-bold ${i18n.language === 'en' ? 'bg-indigo-600 text-white' : 'text-indigo-200 hover:text-white'}`}
                  >
                    EN
                  </button>
                </div>

                {/* Network & sync states */}
                {syncStatus === "syncing" && (
                  <span className="bg-blue-600 text-white px-2.5 py-1 rounded-full flex items-center gap-1">
                    <i className="fa-solid fa-arrows-rotate animate-spin"></i> {t('syncing')}
                  </span>
                )}
                {syncStatus === "synced" && (
                  <span className="bg-emerald-600 text-white px-2.5 py-1 rounded-full flex items-center gap-1">
                    <i className="fa-solid fa-cloud-arrow-up"></i> {t('synced')}
                  </span>
                )}
                {syncStatus === "pending_sync" && (
                  <span className="bg-amber-600 text-white px-2.5 py-1 rounded-full flex items-center gap-1 animate-pulse">
                    <i className="fa-solid fa-clock-rotate-left"></i> {t('pending_sync')}
                  </span>
                )}
                <span className={`px-2.5 py-1 rounded-full flex items-center gap-1 ${isOnline ? 'bg-indigo-500' : 'bg-rose-600'}`}>
                  <span className={`w-1.5 h-1.5 rounded-full bg-white ${isOnline ? 'animate-ping' : ''}`}></span>
                  <span>{isOnline ? t('online') : t('offline')}</span>
                </span>
              </div>
            </div>
          </header>

          {/* Month Navigation */}
          <nav className="bg-white border-b border-slate-200 sticky top-[52px] z-30 shadow-sm">
            <div className="max-w-7xl mx-auto px-4 overflow-x-auto whitespace-nowrap scrollbar-none flex">
              {getMonthsForYear(selectedYear).map((m) => (
                <button
                  key={m}
                  onClick={() => setSelectedMonth(m)}
                  className={`flex-1 min-w-[70px] py-4 text-center font-semibold text-sm transition-all border-b-2 outline-none ${
                    selectedMonth === m
                      ? 'border-indigo-600 text-indigo-600 bg-indigo-5/50'
                      : 'border-transparent text-slate-500 hover:text-slate-800 hover:bg-slate-50'
                  }`}
                >
                  {t(`months.${m}`)}
                </button>
              ))}
            </div>
          </nav>

          {/* Main Layout Area */}
          <main className="flex-grow max-w-7xl mx-auto w-full px-4 py-6 space-y-6">
            
            {/* Aggregate Metric Cards */}
            <section className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
              <div className="bg-emerald-50 border border-emerald-200 rounded-2xl p-4 flex items-center justify-between shadow-sm">
                <div>
                  <p className="text-xs font-bold text-emerald-800 uppercase">{t('totalIncome')}</p>
                  <p className="text-2xl font-black text-emerald-900 mt-1">{formatCurrency(totalIncome)}</p>
                </div>
                <div className="w-12 h-12 rounded-full bg-emerald-100 flex items-center justify-center text-emerald-600">
                  <i className="fa-solid fa-circle-arrow-down text-xl"></i>
                </div>
              </div>

              <div className="bg-rose-50 border border-rose-200 rounded-2xl p-4 flex items-center justify-between shadow-sm">
                <div>
                  <p className="text-xs font-bold text-rose-800 uppercase">{t('totalExpenses')}</p>
                  <p className="text-2xl font-black text-rose-900 mt-1">{formatCurrency(totalExpenses)}</p>
                </div>
                <div className="w-12 h-12 rounded-full bg-rose-100 flex items-center justify-center text-rose-600">
                  <i className="fa-solid fa-circle-arrow-up text-xl"></i>
                </div>
              </div>

              <div className={`border rounded-2xl p-4 flex items-center justify-between shadow-sm transition-colors ${
                saldo >= 0 ? 'bg-indigo-50 border-indigo-200' : 'bg-amber-50 border-amber-200'
              }`}>
                <div>
                  <p className={`text-xs font-bold uppercase ${saldo >= 0 ? 'text-indigo-800' : 'text-amber-800'}`}>{t('saldo')} ({t(`months.${selectedMonth}`)})</p>
                  <p className={`text-2xl font-black mt-1 ${saldo >= 0 ? 'text-indigo-900' : 'text-amber-900'}`}>{formatCurrency(saldo)}</p>
                </div>
                <div className={`w-12 h-12 rounded-full flex items-center justify-center ${
                  saldo >= 0 ? 'bg-indigo-100 text-indigo-600' : 'bg-amber-100 text-amber-600'
                }`}>
                  <i className={`fa-solid text-xl ${saldo >= 0 ? 'fa-scale-balanced' : 'fa-triangle-exclamation'}`}></i>
                </div>
              </div>

              <div className="bg-slate-100 border border-slate-200 rounded-2xl p-4 flex items-center justify-between shadow-sm">
                <div>
                  <p className="text-xs font-bold text-slate-700 uppercase">{t('spentRatio')}</p>
                  <p className="text-2xl font-black text-slate-900 mt-1">{percentageSpent.toFixed(1)}%</p>
                </div>
                <div className="w-full max-w-[80px] bg-slate-200 rounded-full h-2.5 ml-2">
                  <div 
                    className={`h-2.5 rounded-full transition-all duration-300 ${
                      percentageSpent > 100 ? 'bg-rose-600' : percentageSpent > 85 ? 'bg-amber-500' : 'bg-indigo-600'
                    }`} 
                    style={{ width: `${Math.min(percentageSpent, 100)}%` }}
                  ></div>
                </div>
              </div>
            </section>

            {/* Visual Analytics section */}
            <section className="bg-white rounded-2xl border border-slate-200 shadow-sm p-4">
              <h3 className="text-sm font-bold text-slate-700 mb-3 flex items-center gap-2">
                <i className="fa-solid fa-chart-simple text-indigo-600"></i> {t('analyticsHeader')} - {selectedYear}
              </h3>
              <div className="h-[260px] relative w-full">
                <canvas ref={chartRef}></canvas>
              </div>
            </section>

            {/* Ledger Tables */}
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
              
              {/* TABLE A: EINKÜNFTE */}
              <section className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden flex flex-col">
                <div className="p-4 border-b border-slate-200 bg-emerald-50/50 flex items-center justify-between">
                  <h3 className="text-lg font-bold text-emerald-900 flex items-center gap-2">
                    <i className="fa-solid fa-money-bill-trend-up text-emerald-600"></i> {t('incomesHeader')}
                  </h3>
                  <span className="text-xs font-semibold px-2.5 py-1 bg-emerald-100 text-emerald-800 rounded-full">
                    {t('sum')}: {formatCurrency(totalIncome)}
                  </span>
                </div>
                <div className="overflow-x-auto flex-grow">
                  <table className="w-full text-left border-collapse">
                    <thead>
                      <tr className="bg-slate-100 border-b border-slate-200 text-xs font-semibold text-slate-600 uppercase">
                        <th className="p-3">{t('posten')}</th>
                        <th className="p-3 w-32 text-right">{t(`months.${selectedMonth}`)} (€)</th>
                        <th className="p-3 w-28 text-right">{t('resultYtd')}</th>
                        <th className="p-3 w-28 text-right">{t('avgSchnitt')}</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-100 text-sm">
                      {data.categories.incomes.map((item) => {
                        const { ytdTotal, average } = getItemStats('incomes', item);
                        const val = data.values[selectedYear]?.incomes[item]?.[selectedMonth];
                        return (
                          <tr key={item} className="hover:bg-slate-50 transition">
                            <td className="p-3 font-medium text-slate-700">{t(`categories.${item}`)}</td>
                            <td className="p-3">
                              <input
                                type="number"
                                step="any"
                                value={val !== undefined && val !== 0 ? val : ''}
                                placeholder="0"
                                onChange={(e) => handleValueChange('incomes', item, selectedMonth, e.target.value)}
                                className="w-full text-right bg-slate-50 focus:bg-white border border-slate-200 focus:border-indigo-500 rounded px-2 py-1 outline-none font-semibold transition"
                              />
                            </td>
                            <td className="p-3 text-right text-slate-600 font-medium">{formatCurrency(ytdTotal)}</td>
                            <td className="p-3 text-right text-slate-500 text-xs">{formatCurrency(average)}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>

                {/* Inline Custom Income Input */}
                <div className="p-3 bg-slate-50 border-t border-slate-100 flex gap-2">
                  <input
                    type="text"
                    value={customIncomeInput}
                    onChange={(e) => setCustomIncomeInput(e.target.value)}
                    placeholder={t('addPlaceholder')}
                    className="flex-grow bg-white border border-slate-200 rounded px-3 py-1.5 text-sm outline-none focus:border-indigo-500 transition"
                  />
                  <button
                    onClick={() => handleAddCategory('incomes', customIncomeInput, setCustomIncomeInput)}
                    className="bg-indigo-600 hover:bg-indigo-500 text-white text-xs px-4 py-2 rounded-lg font-bold transition flex items-center gap-1 shrink-0"
                  >
                    <i className="fa-solid fa-plus"></i> Add
                  </button>
                </div>
              </section>

              {/* TABLE B: AUSGABEN */}
              <section className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden flex flex-col">
                <div className="p-4 border-b border-slate-200 bg-rose-50/50 flex items-center justify-between">
                  <h3 className="text-lg font-bold text-rose-900 flex items-center gap-2">
                    <i className="fa-solid fa-cart-shopping text-rose-600"></i> {t('expensesHeader')}
                  </h3>
                  <span className="text-xs font-semibold px-2.5 py-1 bg-rose-100 text-rose-800 rounded-full">
                    {t('sum')}: {formatCurrency(totalExpenses)}
                  </span>
                </div>
                <div className="overflow-x-auto max-h-[500px] overflow-y-auto flex-grow">
                  <table className="w-full text-left border-collapse">
                    <thead className="sticky top-0 bg-slate-100 border-b border-slate-200 text-xs font-semibold text-slate-600 uppercase z-10">
                      <tr>
                        <th className="p-3 bg-slate-100">{t('posten')}</th>
                        <th className="p-3 w-32 text-right bg-slate-100">{t(`months.${selectedMonth}`)} (€)</th>
                        <th className="p-3 w-28 text-right bg-slate-100">{t('resultYtd')}</th>
                        <th className="p-3 w-28 text-right bg-slate-100">{t('avgSchnitt')}</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-100 text-sm">
                      {data.categories.expenses.map((item) => {
                        const { ytdTotal, average } = getItemStats('expenses', item);
                        const val = data.values[selectedYear]?.expenses[item]?.[selectedMonth];
                        return (
                          <tr key={item} className="hover:bg-slate-50 transition">
                            <td className="p-3 font-medium text-slate-700">{t(`categories.${item}`)}</td>
                            <td className="p-3">
                              <input
                                type="number"
                                step="any"
                                value={val !== undefined && val !== 0 ? val : ''}
                                placeholder="0"
                                onChange={(e) => handleValueChange('expenses', item, selectedMonth, e.target.value)}
                                className="w-full text-right bg-slate-50 focus:bg-white border border-slate-200 focus:border-indigo-500 rounded px-2 py-1 outline-none font-semibold transition"
                              />
                            </td>
                            <td className="p-3 text-right text-slate-600 font-medium">{formatCurrency(ytdTotal)}</td>
                            <td className="p-3 text-right text-slate-500 text-xs">{formatCurrency(average)}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>

                {/* Inline Custom Expense Input */}
                <div className="p-3 bg-slate-50 border-t border-slate-100 flex gap-2">
                  <input
                    type="text"
                    value={customExpenseInput}
                    onChange={(e) => setCustomExpenseInput(e.target.value)}
                    placeholder={t('addPlaceholder')}
                    className="flex-grow bg-white border border-slate-200 rounded px-3 py-1.5 text-sm outline-none focus:border-indigo-500 transition"
                  />
                  <button
                    onClick={() => handleAddCategory('expenses', customExpenseInput, setCustomExpenseInput)}
                    className="bg-indigo-600 hover:bg-indigo-500 text-white text-xs px-4 py-2 rounded-lg font-bold transition flex items-center gap-1 shrink-0"
                  >
                    <i className="fa-solid fa-plus"></i> Add
                  </button>
                </div>
              </section>

            </div>

            {/* Global Reset Button */}
            <div className="flex justify-center pt-4">
              <button 
                onClick={handleResetData}
                className="bg-slate-200 text-slate-700 hover:bg-rose-600 hover:text-white transition duration-200 px-6 py-2 rounded-lg font-bold text-sm shadow-sm flex items-center gap-2"
              >
                <i className="fa-solid fa-trash-can"></i> {t('clearAll')}
              </button>
            </div>
          </main>
        </div>
      );
    }

    function App() {
      return (
        <LanguageProvider>
          <MainAppContent />
        </LanguageProvider>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(async (reg) => {
            if ('SyncManager' in window) {
              try {
                await reg.sync.register('sync-budget');
              } catch (e) {
                console.warn('Sync registration failed: ', e);
              }
            }
          })
          .catch(err => console.error('SW registration error:', err));
      });
    }
  </script>
</body>
</html>
