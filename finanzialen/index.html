    const LanguageContext = createContext();

    function LanguageProvider({ children }) {
      const [lang, setLang] = useState(() => {
        try {
          return localStorage.getItem('budget_app_lang') || 'de';
        } catch (e) {
          return 'de';
        }
      });

      const changeLanguage = (newLang) => {
        setLang(newLang);
        try {
          localStorage.setItem('budget_app_lang', newLang);
        } catch (e) {
          console.warn("Could not save language to localStorage:", e);
        }
      };

      const t = (path) => {
        const keys = path.split('.');
        let translation = translations[lang];
        for (const key of keys) {
          if (translation && translation[key] !== undefined) {
            translation = translation[key];
          } else {
            let fallback = translations['en'];
            for (const fallbackKey of keys) {
              if (fallback && fallback[fallbackKey] !== undefined) {
                fallback = fallback[fallbackKey];
              } else {
                fallback = null;
                break;
              }
            }
            return fallback || path;
          }
        }
        return translation;
      };

      return (
        <LanguageContext.Provider value={{ t, i18n: { language: lang, changeLanguage } }}>
          {children}
        </LanguageContext.Provider>
      );
    }

    const useTranslation = () => useContext(LanguageContext);

    // Initial basic structural state generator
    const generateInitialState = () => {
      const state = {
        categories: {
          incomes: [...INITIAL_CATEGORIES.incomes],
          expenses: [...INITIAL_CATEGORIES.expenses]
        },
        values: {},
        initialSavingsBase: 5000, 
        categoryOverrides: {} 
      };
      ["2026", "2027", "2028"].forEach(year => {
        state.values[year] = { incomes: {}, expenses: {} };
        state.categories.incomes.forEach(item => {
          state.values[year].incomes[item] = {};
          getMonthsForYear(parseInt(year)).forEach(m => state.values[year].incomes[item][m] = 0);
        });
        state.categories.expenses.forEach(item => {
          state.values[year].expenses[item] = {};
          getMonthsForYear(parseInt(year)).forEach(m => state.values[year].expenses[item][m] = 0);
        });
      });
      return state;
    };

    // Non-destructive safe merging logic
    const mergeAndLockState = (loadedState) => {
      if (!loadedState) return generateInitialState();

      const merged = {
        categories: {
          incomes: [...(loadedState.categories?.incomes || INITIAL_CATEGORIES.incomes)],
          expenses: [...(loadedState.categories?.expenses || INITIAL_CATEGORIES.expenses)]

        values: { ...(loadedState.values || {}) },
        initialSavingsBase: loadedState.initialSavingsBase !== undefined ? loadedState.initialSavingsBase : 5000,
        categoryOverrides: loadedState.categoryOverrides || {}
      };

      // Non-destructively append any missing base categories to ensure safe structural initialization
      INITIAL_CATEGORIES.incomes.forEach(item => {
        if (!merged.categories.incomes.includes(item)) {
          merged.categories.incomes.push(item);
        }
      });
      INITIAL_CATEGORIES.expenses.forEach(item => {
        if (!merged.categories.expenses.includes(item)) {
          merged.categories.expenses.push(item);
        }
      });

      // Synchronize month properties safely across active year scopes
      ["2026", "2027", "2028"].forEach(year => {
        if (!merged.values[year]) {
          merged.values[year] = { incomes: {}, expenses: {} };
        }
        if (!merged.values[year].incomes) merged.values[year].incomes = {};
        if (!merged.values[year].expenses) merged.values[year].expenses = {};

          if (!merged.values[year].incomes[item]) {
            merged.values[year].incomes[item] = {};
          }
          getMonthsForYear(parseInt(year)).forEach(m => {
            if (merged.values[year].incomes[item][m] === undefined) {
              merged.values[year].incomes[item][m] = 0;
            }
          });
        });

        merged.categories.expenses.forEach(item => {
          if (!merged.values[year].expenses[item]) {
            merged.values[year].expenses[item] = {};
          }
          getMonthsForYear(parseInt(year)).forEach(m => {
            if (merged.values[year].expenses[item][m] === undefined) {
              merged.values[year].expenses[item][m] = 0;
            }
          });
        });
      });

      return merged;
    };

    // Local IndexedDB caching driver with safe LocalStorage Fallback
    const IDB = {
      dbName: 'BudgetDatabase_v2',
      dbVersion: 1,
      open() {
        return new Promise((resolve, reject) => {
          if (typeof indexedDB === 'undefined') {
            reject(new Error("IndexedDB not supported in this browser"));
            return;
          }
          try {
            const request = indexedDB.open(this.dbName, this.dbVersion);
            request.onupgradeneeded = (e) => {
              const database = e.target.result;
              if (!database.objectStoreNames.contains('state')) {
                database.createObjectStore('state', { keyPath: 'id' });
              }
              if (!database.objectStoreNames.contains('queue')) {
                database.createObjectStore('queue', { keyPath: 'id' });
              }
            };
            request.onsuccess = (e) => resolve(e.target.result);
            request.onerror = (e) => reject(e.target.error);
          } catch (err) {
            reject(err);
          }
        });
      },
      async get(storeName, key) {
        try {
          const database = await this.open();
          return new Promise((resolve, reject) => {
            const tx = database.transaction(storeName, 'readonly');
            const store = tx.objectStore(storeName);
            const request = store.get(key);
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
          });
        } catch (e) {
          console.warn("IndexedDB access failed, falling back to LocalStorage:", e);
          try {
            const serialized = localStorage.getItem(`fallback_${storeName}_${key}`);
            return serialized ? JSON.parse(serialized) : null;
          } catch (err) {
            return null;
          }
        }
      },
      async set(storeName, value) {
        try {
          const database = await this.open();
          return new Promise((resolve, reject) => {
            const tx = database.transaction(storeName, 'readwrite');
            const store = tx.objectStore(storeName);
            const request = store.put(value);
            request.onsuccess = () => resolve();
            request.onerror = () => reject(request.error);
          });
        } catch (e) {
          console.warn("IndexedDB save failed, saving to LocalStorage fallback:", e);
          try {
            localStorage.setItem(`fallback_${storeName}_${value.id || 'data'}`, JSON.stringify(value));
          } catch (err) {}
        }
      },
      async delete(storeName, key) {
        try {
          const database = await this.open();
          return new Promise((resolve, reject) => {
            const tx = database.transaction(storeName, 'readwrite');
            const store = tx.objectStore(storeName);
            const request = store.delete(key);
            request.onsuccess = () => resolve();
            request.onerror = () => reject(request.error);
          });
        } catch (e) {
          console.warn("IndexedDB deletion failed, cleaning LocalStorage fallback:", e);
          try {
            localStorage.removeItem(`fallback_${storeName}_${key}`);
          } catch (err) {}
        }
      }
    };

      const [selectedYear, setSelectedYear] = useState(2026);
      const [selectedMonth, setSelectedMonth] = useState("Jun");
      const [isOnline, setIsOnline] = useState(navigator.onLine);
      const [syncStatus, setSyncStatus] = useState("initialized");
      const [isBurgerOpen, setIsBurgerOpen] = useState(false); 
      const [activeTab, setActiveTab] = useState("view"); 
      const [isAuditOpen, setIsAuditOpen] = useState(false); 

      // Tri-State Theme Engine state with safe wrapper
      const [theme, setTheme] = useState(() => {
        try {
          return localStorage.getItem('budget_app_theme') || 'system';
        } catch (e) {
          return 'system';
        }
      });

      const [customIncomeInput, setCustomIncomeInput] = useState("");
      const [customExpenseInput, setCustomExpenseInput] = useState("");

      const [editingCategory, setEditingCategory] = useState(null); 
      const [editCategoryValue, setEditCategoryValue] = useState("");

      // Recurring budget wizard configuration
      const [recurringSetup, setRecurringSetup] = useState(null); // { type, item, value }
      const [recurringMonths, setRecurringMonths] = useState(3);

      const chartRef = useRef(null);
      const chartInstanceRef = useRef(null);
      const annualChartRef = useRef(null); 
      const annualChartInstanceRef = useRef(null);
      const fileInputRef = useRef(null);

      // Manual Category Overrides Mapping
      const getEffectiveExpenseBracket = (posten) => {
        if (data.categoryOverrides && data.categoryOverrides[posten]) {
          return data.categoryOverrides[posten];
        }
        return getExpenseBracket(posten);
      };

      // App Theme Engine bootstrap hook
      useEffect(() => {
        try {
          localStorage.setItem('budget_app_theme', theme);
        } catch (e) {
          console.warn("Writing theme to localStorage is restricted:", e);
        }
        const applyTheme = (val) => {
          const rootEl = document.documentElement;
          let resolvedTheme = val;
          if (val === 'system') {
            resolvedTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          rootEl.setAttribute('data-theme', resolvedTheme);
          
          if (resolvedTheme === 'dark') {
            rootEl.classList.add('dark');
          } else {
            rootEl.classList.remove('dark');
          }
        };
        
        applyTheme(theme);

        if (theme === 'system') {
          const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
          const handleChange = (e) => {
            const rootEl = document.documentElement;
            const resolved = e.matches ? 'dark' : 'light';
            rootEl.setAttribute('data-theme', resolved);
            if (resolved === 'dark') {
              rootEl.classList.add('dark');
            } else {
              rootEl.classList.remove('dark');
            }
          };
          mediaQuery.addEventListener('change', handleChange);
          return () => mediaQuery.removeEventListener('change', handleChange);
        }
      }, [theme]);

      useEffect(() => {
        if (selectedMonth === "AnnualOverview") return; 
        const validMonths = getMonthsForYear(selectedYear);
        if (!validMonths.includes(selectedMonth)) {
          setSelectedMonth(validMonths[0]);
        }
      }, [selectedYear]);

      // Seed local cache safely, subscribe securely to frozen cloud paths [1, 3]
      useEffect(() => {
        async function loadInitialData() {
          try {
            const cached = await IDB.get('state', 'budget_data');
            if (cached) {
              setData(mergeAndLockState(cached.payload));
            }
          } catch (e) {
            console.warn("Failed to load local IndexedDB state", e);
          }
        }
        loadInitialData();

        // Lock database references safely to avoid structural siloing [1]
        let unsubscribe = () => {};
        if (db) {
          try {
            unsubscribe = db.collection('monthly_logs').doc('house_finanzen_state')
              .onSnapshot(async (doc) => {
                if (doc.exists) {
                  const remote = doc.data();
                  const localCached = await IDB.get('state', 'budget_data');
                  
                  // Apply remote configurations only if remote is chronologically newer [1]
                  if (!localCached || remote.updatedAt > localCached.updatedAt) {
                    const merged = mergeAndLockState(remote.payload);
                    setData(merged);
                    await IDB.set('state', { id: 'budget_data', payload: merged, updatedAt: remote.updatedAt });
                    setSyncStatus("synced");
                  }
                }
              }, (err) => {
                console.warn("Firestore connection offline or restricted:", err);
              });
          } catch (err) {
            console.warn("Failed to bind Firestore listener:", err);
          }
        }

        return () => unsubscribe();
      }, []);

      // Connectivity sync triggers
      useEffect(() => {
        const handleOnline = async () => {
          setIsOnline(true);
          await triggerLocalToCloudSync();
        };
        const handleOffline = () => setIsOnline(false);

        window.addEventListener('online', handleOnline);
        window.addEventListener('offline', handleOffline);
        return () => {
          window.removeEventListener('online', handleOnline);
          window.removeEventListener('offline', handleOffline);
        };
      }, [data]);

      // Strict Chronological Running Balance Engine
      const chronologicalTimelineResult = useMemo(() => {
        const resultSequence = {};
        let runningGuthaben = 0; 

        // Order across full active years strictly
        const targetSequence = [];
        [2026, 2027, 2028].forEach(yr => {
          getMonthsForYear(yr).forEach(mo => {
            targetSequence.push({ year: yr, month: mo });
          });
        });

        targetSequence.forEach(({ year, month }) => {
          const yearData = data.values[year];
          let monthlyIn = 0;
          let monthlyEx = 0;

          if (yearData) {
            if (yearData.incomes) {
              data.categories.incomes.forEach(category => {
                monthlyIn += parseFloat(yearData.incomes[category]?.[month]) || 0;
              });
            }
            if (yearData.expenses) {
              data.categories.expenses.forEach(category => {
                monthlyEx += parseFloat(yearData.expenses[category]?.[month]) || 0;
              });
            }
          }

          const availableFunds = runningGuthaben + monthlyIn;
          const endLeftover = availableFunds - monthlyEx;

          resultSequence[`${year}-${month}`] = {
            availableFunds,
            leftover: endLeftover,
            monthlyIncome: monthlyIn,
            monthlyExpenses: monthlyEx,
            prevGuthaben: runningGuthaben
          };

          runningGuthaben = endLeftover;
        });

        return resultSequence;
      }, [data]);

      // Side-by-side grouped stacked visual chart logic
      useEffect(() => {
        if (selectedMonth === "AnnualOverview") return;
        if (!chartRef.current) return;
        if (typeof Chart === 'undefined') {
          console.warn("Chart.js failed to load or is blocked. Visual graphics are disabled.");
          return;
        }

        const ctx = chartRef.current.getContext('2d');
        const monthsForYear = getMonthsForYear(selectedYear);

        const incomeData = monthsForYear.map(m => getMonthlyTotal('incomes', m));
        const translatedLabels = monthsForYear.map(m => t(`months.${m}`));

        if (chartInstanceRef.current) {
          chartInstanceRef.current.destroy();
        }

        const isDarkTheme = document.documentElement.classList.contains('dark');
        const axisColor = isDarkTheme ? '#a1a1aa' : '#52525b';
        const gridColor = isDarkTheme ? 'rgba(250, 250, 250, 0.08)' : 'rgba(24, 24, 27, 0.06)'; 

        chartInstanceRef.current = new Chart(ctx, {
          type: 'bar',
          data: {
            labels: translatedLabels,
            datasets: [
              {
                label: t('incomesHeader'),
                data: incomeData,
                backgroundColor: '#10b981', 
                stack: 'Stack0',
                borderRadius: 4,
              },
              {
                label: t('bracketHousing'),
                data: monthsForYear.map(m => getBracketMonthlyTotal('housing', m)),
                backgroundColor: '#475569', 
                stack: 'Stack1',
                borderRadius: 4,
              },
              {
                label: t('bracketLiving'),
                data: monthsForYear.map(m => getBracketMonthlyTotal('living', m)),
                backgroundColor: '#f59e0b', 
                stack: 'Stack1',
                borderRadius: 4,
              },
              {
                label: t('bracketSubscriptions'),
                data: monthsForYear.map(m => getBracketMonthlyTotal('subscriptions', m)),
                backgroundColor: '#7c3aed', 
                stack: 'Stack1',
                borderRadius: 4,
              },
              {
                label: t('bracketLeisure'),
                data: monthsForYear.map(m => getBracketMonthlyTotal('leisure', m)),
                backgroundColor: '#ec4899', 
                stack: 'Stack1',
                borderRadius: 4,
              },
              {
                label: t('bracketProfessional'),
                data: monthsForYear.map(m => getBracketMonthlyTotal('professional', m)),
                backgroundColor: '#14b8a6', 
                stack: 'Stack1',
                borderRadius: 4,
              }
            ]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
              x: {
                ticks: { color: axisColor },
                grid: { color: gridColor }
              },
              y: {
                beginAtZero: true,
                ticks: {
                  color: axisColor,
                  callback: function(value) {
                    return value.toLocaleString(i18n.language === 'de' ? 'de-DE' : 'en-US', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 });
                  }
                },
                grid: { color: gridColor }
              }
            },
            plugins: {
              legend: {
                labels: { color: axisColor }
              },
              tooltip: {
                callbacks: {
                  label: function(context) {
                    let label = context.dataset.label || '';
                    if (label) label += ': ';
                    if (context.parsed.y !== null) {
                      label += new Intl.NumberFormat(i18n.language === 'de' ? 'de-DE' : 'en-US', { style: 'currency', currency: 'EUR' }).format(context.parsed.y);
                    }
                    return label;
                  }
                }
              }
            }
          }
        });

        return () => {
          if (chartInstanceRef.current) {
            chartInstanceRef.current.destroy();
          }
        };
      }, [data, selectedYear, selectedMonth, i18n.language, theme]);

      // Annual overview analytics compiling layer
      const annualOverviewData = useMemo(() => {
        const yearValues = data.values[selectedYear];
        const monthsForYear = getMonthsForYear(selectedYear);
        const totalsByCategory = {};

        let totalYearlyIn = 0;
        let totalYearlyEx = 0;
        const monthTotals = {};

        data.categories.expenses.forEach(category => {
          totalsByCategory[category] = 0;
        });

        monthsForYear.forEach(m => {
          let mIn = 0;
          let mEx = 0;

          data.categories.incomes.forEach(category => {
            const val = parseFloat(yearValues?.incomes?.[category]?.[m]) || 0;
            totalYearlyIn += val;
            mIn += val;
          });

          data.categories.expenses.forEach(category => {
            const val = parseFloat(yearValues?.expenses?.[category]?.[m]) || 0;
            totalYearlyEx += val;
            totalsByCategory[category] += val;
            mEx += val;
          });

          monthTotals[m] = { income: mIn, expenses: mEx };
        });

        // Sorted lists by total expenditures
        const sortedExpenses = Object.keys(totalsByCategory)
          .map(cat => ({ category: cat, total: totalsByCategory[cat] }))
          .sort((a, b) => b.total - a.total);

        const peakCategory = sortedExpenses[0]?.total > 0 ? sortedExpenses[0].category : null;

        let highestMonth = null;
        let maxMonthEx = 0;
        monthsForYear.forEach(m => {
          if (monthTotals[m].expenses > maxMonthEx) {
            maxMonthEx = monthTotals[m].expenses;
            highestMonth = m;
          }
        });

        const savingsRate = totalYearlyIn > 0 
          ? ((totalYearlyIn - totalYearlyEx) / totalYearlyIn) * 100 
          : 0;

        return {
          totalYearlyIn,
          totalYearlyEx,
          sortedExpenses,
          peakCategory,
          highestMonth,
          savingsRate,
          monthTotals
        };
      }, [data, selectedYear]);

      // Chart.js script for end-of-year pie overview
      useEffect(() => {
        if (selectedMonth !== "AnnualOverview") return;
        if (!annualChartRef.current) return;
        if (typeof Chart === 'undefined') {
          console.warn("Chart.js failed to load. Visual breakdown disabled.");
          return;
        }

        const ctx = annualChartRef.current.getContext('2d');

        const activeExpenditures = annualOverviewData.sortedExpenses.filter(e => e.total > 0);
        const datasetLabels = activeExpenditures.map(e => {
          const key = t(`categories.${e.category}`);
          return key.replace('categories.', '');
        });
        const datasetValues = activeExpenditures.map(e => e.total);

        // Assign bracket aligned background colors for aesthetic consistency
        const backgroundColors = activeExpenditures.map(e => {
          const bracket = getEffectiveExpenseBracket(e.category);
          if (bracket === 'housing') return '#475569';
          if (bracket === 'living') return '#f59e0b';
          if (bracket === 'subscriptions') return '#7c3aed';
          if (bracket === 'professional') return '#14b8a6';
          return '#ec4899';
        });

        if (annualChartInstanceRef.current) {
          annualChartInstanceRef.current.destroy();
        }

        const isDarkTheme = document.documentElement.classList.contains('dark');
        const textColor = isDarkTheme ? '#a1a1aa' : '#52525b';

        annualChartInstanceRef.current = new Chart(ctx, {
          type: 'doughnut',
          data: {
            labels: datasetLabels,
            datasets: [{
              data: datasetValues,
              backgroundColor: backgroundColors,
              borderWidth: 1,
              borderColor: isDarkTheme ? '#18181b' : '#ffffff'
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: {

                  color: textColor
                }
              }

          }

        return () => {
          if (annualChartInstanceRef.current) {
            annualChartInstanceRef.current.destroy();
          }
        };
      }, [data, selectedYear, selectedMonth, i18n.language, annualOverviewData, theme]);

      const triggerLocalToCloudSync = async () => {
        if (!db) return;
        setSyncStatus("syncing");
        try {
          const queueItem = await IDB.get('queue', 'pending_sync');
          if (queueItem) {
            const docRef = db.collection('monthly_logs').doc('house_finanzen_state');
            const doc = await docRef.get();
            if (!doc.exists || queueItem.updatedAt > doc.data().updatedAt) {
              await docRef.set({
                payload: queueItem.payload,
                updatedAt: queueItem.updatedAt
              });
            }
            await IDB.delete('queue', 'pending_sync');
          }
          setSyncStatus("synced");
        } catch (e) {
          setSyncStatus("pending_sync");
        }
      };

      const saveStateAndDispatch = async (updatedData, timestamp) => {
        setData(updatedData);
        await IDB.set('state', { id: 'budget_data', payload: updatedData, updatedAt: timestamp });
        await IDB.set('queue', { id: 'pending_sync', payload: updatedData, updatedAt: timestamp });

        if (navigator.onLine && db) {
          setSyncStatus("syncing");
          try {
            await db.collection('monthly_logs').doc('ho
